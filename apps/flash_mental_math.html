<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>フラッシュ暗算</title>
<style>
  body{margin:0;min-height:100vh;min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;background:url("../img/bg/ダンジョン_洞窟_祭壇.png");background-size:cover;background-position:center;background-repeat:no-repeat;background-attachment:fixed;color:#eef2ff;text-shadow:0 2px 5px rgba(0,0,0,.9),0 0 12px rgba(0,0,0,.65)}
  .page{position:relative;width:100%;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding-top:4px}
  .topbar{width:min(500px,90vw);display:flex;align-items:center;justify-content:space-between}
  .center{flex:1;width:100%;display:flex;align-items:center;justify-content:center}
  .frame{width:min(500px,90vw)}
  #backBtn{padding:6px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.34);background:rgba(12,18,38,.42);color:#eef2ff;cursor:pointer}
  .box{box-sizing:border-box;position:relative;width:100%;padding:18px 18px 28px;border:1px solid rgba(255,255,255,.28);border-radius:16px;background:rgba(18,26,51,.38);box-shadow:0 12px 30px rgba(0,0,0,.28);-webkit-tap-highlight-color:transparent}
  .box.is-startable{cursor:pointer}
  .box.is-startable:hover{border-color:#ffffff33}
  .box.is-startable:active{box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  button{font:inherit;border-radius:12px;border:1px solid rgba(255,255,255,.3);background:rgba(12,18,38,.48);color:#eef2ff;padding:10px 12px}
  button{cursor:pointer;background:rgba(42,58,102,.58);-webkit-tap-highlight-color:transparent}
  button:active{border-color:#ffffff33;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  button:focus{outline:none}
  button:focus-visible{outline:2px solid rgba(148,163,184,.45);outline-offset:2px}
  button:disabled{opacity:.5;cursor:not-allowed}
  .displayArea{position:relative;height:clamp(220px,38vh,340px);caret-color:transparent;user-select:none;-webkit-user-select:none}
  #n{font-size:72px;font-weight:900;letter-spacing:.02em;text-align:center;height:100%;display:flex;align-items:center;justify-content:center}
  #title{font-size:32px;font-weight:900;letter-spacing:.08em}
  #hint{display:flex;gap:6px;flex-wrap:wrap;align-content:flex-start;justify-content:flex-start;font-size:13px;font-weight:900;height:52px;overflow:hidden}
  #hint div{padding:3px 8px;border-radius:999px;background:rgba(12,18,38,.5)}
  #hint .ok{color:#7cff9b;text-shadow:0 0 12px #24ff6a}
  #hint .ng{color:#ff7c7c;text-shadow:0 0 12px #ff3030}
  #msg{margin-top:10px;font-weight:700;text-align:center;min-height:22px}
  #choices{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:10px}
  .is-hidden,#n.is-hidden,#choices.is-hidden{display:none}
  .choice{background:rgba(26,36,70,.52);font-size:clamp(28px,6vw,48px);font-weight:900;line-height:1}
  .choice.correct{background:rgba(31,122,58,.68);border-color:#2aa84f}
  .choice.wrong{background:rgba(122,31,31,.68);border-color:#a82a2a}
  .startRow{min-height:44px}
  .settings-row{flex-wrap:nowrap;overflow-x:auto;padding:10px 12px}
  .setting-chip{display:inline-flex;align-items:center;gap:6px;flex:0 0 auto;color:#b8c6da;font-size:13px;font-weight:750;white-space:nowrap}
  .setting-value{display:inline-block;min-width:2.3em;color:#f8fafc;font-size:15px;font-weight:900;text-align:center}
  .setting-level{color:#7CFFB2}
</style>
<link rel="stylesheet" href="./lib/app_world_ui.css" />
<script src="./lib/rpg_progression.js"></script>
<script src="./lib/rpg_equipment.js"></script>
<script src="./lib/rpg_study_rewards.js"></script>
<script src="./lib/study_app_core.js"></script>
</head>

<body class="world-app" data-app="mental">
<div class="page">
  <div class="topbar">
    <div id="title">フラッシュ暗算</div>
    <button id="backBtn" type="button" aria-label="トップへ戻る">← 戻る</button>
  </div>
  <div class="center">
    <div class="frame">
      <div class="box" id="box">
        <div class="row settings-row" aria-label="現在の難易度設定">
          <div class="setting-chip setting-level">難易度 <strong>Lv.<output id="difficultyLevel" class="setting-value">11</output></strong></div>
          <div class="setting-chip">個数 <output id="k" class="setting-value">5</output></div>
          <div class="setting-chip">桁 <output id="d" class="setting-value">1</output></div>
          <div class="setting-chip">間隔 <output id="ms" class="setting-value">1000</output> ms</div>
        </div>

        <div class="displayArea">
          <div id="n"></div>
          <div id="choices" class="is-hidden">
            <button class="choice" data-idx="0"></button>
            <button class="choice" data-idx="1"></button>
            <button class="choice" data-idx="2"></button>
            <button class="choice" data-idx="3"></button>
          </div>
        </div>
        <div id="msg"></div>
        <div id="hint"></div>
        
      </div>
      <div id="rewardSlot"></div>
    </div>
  </div>
</div>

<script>
// ===== フラッシュ暗算の難易度・報酬バランス（調整はここだけ） =====
const MENTAL_MATH_CONFIG = Object.freeze({
  difficulty: Object.freeze({
    minLevel: 0,
    levelsPerDigit: 20,
    maxDigits: 6,
    defaultLevel: 10,
    startCount: 3,
    countUpEvery: 5,
    intervalStepMs: 25,
    // 桁が上がるたびに個数を戻し、表示時間も長くして急な難化を防ぐ。
    baseIntervalMsByDigits: Object.freeze([1000, 1100, 1200, 1300, 1400, 1500]),
  }),
  reward: Object.freeze({
    minExp: 3,
    maxExp: 21,
    minDropChance: 0.12,
    maxDropChance: 0.45,
    // RANK 1 の重みを100とした、最低〜最高難易度での相対抽選重み。
    rank2Weight: Object.freeze([1, 25]),
    rank3Weight: Object.freeze([0, 7]),
    rank4Weight: Object.freeze([0, 2]),
    rank5Weight: Object.freeze([0, 0.5]),
  }),
});

(() => {
  const $ = (id) => document.getElementById(id);
  const kEl=$('k'), dEl=$('d'), msEl=$('ms'), difficultyLevelEl=$('difficultyLevel');
  const boxEl=$('box');
  const nEl=$('n'), msgEl=$('msg');
  const choicesEl=$('choices');
  const choiceBtns=Array.from(choicesEl.querySelectorAll('.choice'));
  const rewards = window.RPGStudyRewards.create({
    slot:'#rewardSlot',
    icon:'🧮',
    dropEvery:0
  });
  const results = window.StudyAppCore.createResultHistory({
    target:'#hint',
    limit:6
  });
  let seq=[], sum=0, i=0, t=null, running=false, readyForChoice=false;
  const difficultyConfig = MENTAL_MATH_CONFIG.difficulty;
  const maxDifficultyLevel = difficultyConfig.levelsPerDigit * difficultyConfig.maxDigits - 1;
  let difficultyLevel = difficultyConfig.defaultLevel;
  let activeDifficultyLevel = difficultyLevel;

  const clamp=(value,min,max)=>Math.max(min,Math.min(max,value));
  const mix=(from,to,ratio)=>from+(to-from)*ratio;

  function settingsForDifficulty(level){
    const safeLevel=Math.round(clamp(Number(level)||0,difficultyConfig.minLevel,maxDifficultyLevel));
    const digits=Math.floor(safeLevel/difficultyConfig.levelsPerDigit)+1;
    const phase=safeLevel%difficultyConfig.levelsPerDigit;
    const count=difficultyConfig.startCount+Math.floor(phase/difficultyConfig.countUpEvery);
    const speedPhase=phase%difficultyConfig.countUpEvery;
    const intervalMs=difficultyConfig.baseIntervalMsByDigits[digits-1]
      - speedPhase*difficultyConfig.intervalStepMs;
    return {level:safeLevel,count,digits,intervalMs};
  }

  function applyDifficulty(level){
    difficultyLevel=Math.round(clamp(Number(level)||0,difficultyConfig.minLevel,maxDifficultyLevel));
    const settings=settingsForDifficulty(difficultyLevel);
    difficultyLevelEl.textContent=String(difficultyLevel+1);
    kEl.textContent=String(settings.count);
    dEl.textContent=String(settings.digits);
    msEl.textContent=String(settings.intervalMs);
  }

  function rewardForDifficulty(level){
    const reward=MENTAL_MATH_CONFIG.reward;
    const ratio=clamp((Number(level)-difficultyConfig.minLevel)
      /(maxDifficultyLevel-difficultyConfig.minLevel),0,1);
    return {
      exp:Math.max(1,Math.round(mix(reward.minExp,reward.maxExp,ratio))),
      dropChance:mix(reward.minDropChance,reward.maxDropChance,ratio),
      rankWeights:[
        100,
        mix(reward.rank2Weight[0],reward.rank2Weight[1],ratio),
        mix(reward.rank3Weight[0],reward.rank3Weight[1],ratio*ratio),
        mix(reward.rank4Weight[0],reward.rank4Weight[1],ratio*ratio*ratio),
        mix(reward.rank5Weight[0],reward.rank5Weight[1],ratio*ratio*ratio*ratio),
      ],
    };
  }

  const rangeForDigits=(d)=>{
    d=Math.max(1,Math.min(6,Number(d)||1));
    return d===1 ? [1,9] : [10**(d-1), 10**d-1];
  };

  function setRunning(on){
    running=on;
    updateStartable();
  }

  function updateStartable(){
    if(boxEl) boxEl.classList.toggle('is-startable', !running && !readyForChoice);
  }

  function clearTimer(){ if(t){ clearTimeout(t); t=null; } }

  function reset(){
    clearTimer();
    rewards.hide();
    seq=[]; sum=0; i=0;
    nEl.textContent='';
    msgEl.textContent='';
    readyForChoice=false;
    showStart();
    choiceBtns.forEach(b=>{
      b.textContent='';
      b.disabled=true;
      b.classList.remove('correct','wrong');
    });
    setRunning(false);
  }

  function showNext(){
    if(i>=seq.length){
      showChoices();
      return;
    }
    nEl.textContent=String(seq[i]);
    i++;
    t=setTimeout(showNext, Math.max(50, Number(msEl.textContent)||300));
  }

  function makeChoices(correct){
    const deltas=[-5,-4,-3,-2,-1,1,2,3,4,5];
    const picks=new Set([correct]);
    while(picks.size<4){
      const delta=deltas[window.StudyAppCore.randomInt(0,deltas.length-1)];
      const candidate=correct+delta;
      if(candidate>=0) picks.add(candidate);
    }
    return window.StudyAppCore.shuffle(Array.from(picks));
  }

  function showChoices(){
    const choices=makeChoices(sum);
    choiceBtns.forEach((b,idx)=>{
      b.textContent=String(choices[idx]);
      b.dataset.value=String(choices[idx]);
      b.disabled=false;
      b.classList.remove('correct','wrong');
    });
    nEl.classList.add('is-hidden');
    choicesEl.classList.remove('is-hidden');
    readyForChoice=true;
    updateStartable();
  }
  function showStart(){
    choicesEl.classList.add('is-hidden');
    nEl.classList.remove('is-hidden');
    nEl.textContent='開始';
    msgEl.textContent='';
    updateStartable();
  }

  function revealResult(chosen){
    const correctVal=String(sum);
    let gain = 0;
    const ok = Boolean(chosen && chosen.dataset.value===correctVal);
    choiceBtns.forEach(b=>{
      if(b.dataset.value===correctVal) b.classList.add('correct');
    });
    if(ok){
      const reward=rewardForDifficulty(activeDifficultyLevel);
      gain=reward.exp;
      rewards.award(reward);
    }
    if(chosen && !ok){
      chosen.classList.add('wrong');
    }
    applyDifficulty(activeDifficultyLevel+(ok ? 1 : -1));
    results.add(ok, ok ? `🎉 正解 +${gain} EXP` : `✖ 不正解 +0 EXP`);
    choiceBtns.forEach(b=>b.disabled=true);
    setTimeout(reset, 1400);
  }

  function start(){
    reset();
    window.StudyAppCore.blurActiveElement();
    activeDifficultyLevel=difficultyLevel;
    const k=Math.max(2, Math.min(200, Number(kEl.textContent)||10));
    const [lo,hi]=rangeForDigits(dEl.textContent);
    seq=[];
    for(let idx=0; idx<k; idx++){
      let next = window.StudyAppCore.randomInt(lo, hi);
      while(seq.length>0 && next===seq[seq.length-1]){
        next = window.StudyAppCore.randomInt(lo, hi);
      }
      seq.push(next);
    }
    sum=seq.reduce((a,b)=>a+b,0);
    i=0;
    msgEl.textContent='';
    choiceBtns.forEach(b=>{ b.disabled=true; b.textContent=''; b.classList.remove('correct','wrong'); });
    choicesEl.classList.add('is-hidden');
    nEl.classList.remove('is-hidden');
    setRunning(true);
    showNext();
  }

  choicesEl.addEventListener('click', (e)=>{
    const btn=e.target.closest('.choice');
    if(!btn || !readyForChoice) return;
    readyForChoice=false;
    revealResult(btn);
  });

  if(boxEl){
    boxEl.addEventListener('click', (e)=>{
      if(running || readyForChoice) return;
      if(e.target.closest('button,.settings-row')) return;
      start();
    });
  }
  const backBtn = $('backBtn');
  if(backBtn){
    backBtn.addEventListener('click', ()=>{
      location.href = '../index.html';
    });
  }

  applyDifficulty(difficultyLevel);
  reset();
})();
</script>
</body>
</html>
