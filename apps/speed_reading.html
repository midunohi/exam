<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>英文速読4択</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg:#0f172a;
      --panel:#0a0f1a;
      --card:#0b1220;
      --border:#1f2937;
      --fg:#e5e7eb;
      --muted:#9ca3af;
      --acc:#22d3ee;
      --answer:#7CFFB2;
    }
    * { box-sizing: border-box; }
    html, body {
      min-height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: url("../img/bg/廃墟_遺跡_川.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--fg);
      text-shadow: 0 2px 5px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.65);
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
    }
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 8px 16px;
      background: linear-gradient(180deg, rgba(15,23,42,.58), rgba(15,23,42,.2) 60%, transparent);
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
    }
    .top-bar-inner {
      width: min(960px, 96vw);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .title {
      font-size: clamp(18px, 3.6vw, 22px);
      font-weight: 800;
      letter-spacing: .3px;
      line-height: 1.15;
      text-align: left;
      margin: 0;
      word-break: break-word;
    }
    .back-btn {
      padding: 6px 14px;
      font-size: 14px;
      border-radius: 999px;
      background: rgba(10,19,34,.48);
      color: var(--fg);
      text-decoration: none;
      border: 1px solid rgba(148,163,184,.28);
      display: inline-block;
      line-height: 1.2;
      white-space: nowrap;
      font-weight: 700;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover { border-color:#2b3a55; }
    .page {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 80px 16px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame {
      width: min(960px, 96vw);
    }
    .word-box {
      width: 100%;
      min-height: clamp(360px, 66dvh, 560px);
      border-radius: 20px;
      border: 1px solid rgba(148,163,184,.28);
      background: rgba(10,19,34,.38);
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 24px 24px 48px;
      gap: 18px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,.28);
      -webkit-tap-highlight-color: transparent;
      caret-color: transparent;
    }
    .word-box > .flashcard-category-row {
      flex: 0 0 auto;
      margin: 0;
    }
    .word-box.is-startable { cursor: pointer; }
    .word-box.is-startable:hover { border-color:#2b3a55; }
    .word-box.is-startable:active {
      border-color:#334155;
      box-shadow: 0 8px 24px rgba(0,0,0,.32), inset 0 0 0 1px rgba(148,163,184,.16);
    }
    .reading-controls {
      position: absolute;
      z-index: 3;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-size: 13px;
      flex-wrap: wrap;
      padding: 10px 16px 0;
      pointer-events: none;
    }
    .reading-controls :is(input, label) { pointer-events: auto; }
    .reading-body {
      flex: 1;
      min-height: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .progress {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .speed {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--muted);
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    input[type="range"] { font-size: 12px; }
    button {
      border: 1px solid rgba(148,163,184,.28);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      background: rgba(10,19,34,.48);
      color: var(--fg);
      font-weight: 800;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    button:hover { border-color:#2b3a55; }
    button:active, .back-btn:active {
      border-color:#334155;
      box-shadow: inset 0 0 0 1px rgba(148,163,184,.14);
    }
    button:focus, .back-btn:focus { outline: none; }
    button:focus-visible, .back-btn:focus-visible {
      outline: 2px solid rgba(34,211,238,.45);
      outline-offset: 2px;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .word-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .word {
      font-size: clamp(32px, 7vw, 72px);
      text-align: center;
      letter-spacing: 0;
      white-space: nowrap;
      font-weight: 800;
    }
    .quiz-area {
      display: none;
      flex: 1;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      min-height: 0;
      user-select: none;
      -webkit-user-select: none;
    }
    .quiz-area.is-visible { display: flex; }
    .quiz-title {
      margin: 0;
      color: var(--muted);
      font-size: clamp(14px, 2.8vw, 17px);
      line-height: 1.45;
      font-weight: 700;
    }
    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .choice-btn {
      width: 100%;
      min-height: clamp(64px, 12dvh, 104px);
      border-radius: 12px;
      padding: 14px 12px;
      background: rgba(15,23,42,.48);
      border: 1px solid rgba(148,163,184,.36);
      color: #e5e7eb;
      text-align: center;
      line-height: 1.35;
      white-space: normal;
      font-size: clamp(18px, 4.6vw, 32px);
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
    }
    .choice-btn.is-correct {
      border-color: #22c55e;
      background: rgba(34, 197, 94, .16);
    }
    .choice-btn.is-wrong {
      border-color: #ef4444;
      background: rgba(239, 68, 68, .14);
    }
    .feedback {
      min-height: 18px;
      color: #cbd5e1;
      font-size: 13px;
      text-align: center;
    }
    .result-history {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-content: flex-start;
      justify-content: flex-start;
      min-height: 52px;
      max-height: 52px;
      overflow: hidden;
      font-size: 13px;
      font-weight: 900;
    }
    .result-history div {
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(10,19,34,.5);
      border: 1px solid rgba(148,163,184,.2);
    }
    .result-history .ok {
      color: #7cff9b;
      text-shadow: 0 0 12px #24ff6a, 0 2px 5px rgba(0,0,0,.9);
      border-color: rgba(124,255,155,.38);
      box-shadow: 0 0 18px rgba(36,255,106,.18);
    }
    .result-history .ng {
      color: #ff7c7c;
      text-shadow: 0 0 12px #ff3030, 0 2px 5px rgba(0,0,0,.9);
      border-color: rgba(255,124,124,.38);
      box-shadow: 0 0 18px rgba(255,48,48,.16);
    }
    @media (max-width: 640px) {
      .page { padding: 72px 12px 18px; }
      .top-bar { padding: 8px 12px; }
      .top-bar-inner { width: 100%; }
      .word-box {
        min-height: min(70dvh, 560px);
        padding: 18px 16px 44px;
        border-radius: 16px;
        gap: 14px;
      }
      .word-box > .flashcard-category-row {
        margin: 0;
      }
      .reading-controls { padding: 9px 12px 0; }
      .speed {
        width: 100%;
        justify-content: space-between;
      }
      .speed input[type="range"] {
        flex: 1;
        min-width: 130px;
      }
      .choices { gap: 10px; }
      .choice-btn {
        min-height: 72px;
        padding: 12px 8px;
      }
    }

      <div id="rewardSlot"></div>

    minDropChance: 0.14,
    maxDropChance: 0.40,
    // RANK 1 の重みを100とした、最低速〜最高速での相対抽選重み。
    rank2Weight: Object.freeze([1, 18]),

    let questionGroups = [];

    const speedSlider  = document.getElementById('speedSlider');
    const speedLabel   = document.getElementById('speedLabel');
    const wordDisplay  = document.getElementById('wordDisplay');
    const progressLabel = document.getElementById('progressLabel');
    const categoryLabel = document.getElementById('categoryLabel');
    const totalCount = document.getElementById('totalCount');
    const countLabel = document.getElementById('countLabel');
    const progressTrack = document.getElementById('progressTrack');
    const progressFill = document.getElementById('progressFill');
    const randomBtn = document.getElementById('randomBtn');
    const wordBox = document.querySelector('.word-box');
    const wordArea = document.querySelector('.word-area');
    const quizArea = document.getElementById('quizArea');
    const choicesEl = document.getElementById('choices');
    const feedbackEl = document.getElementById('feedback');
    const rewards = window.RPGStudyRewards.create({
      slot: '#rewardSlot',
      icon: '📜',
      dropEvery: 0
    });
    const results = window.StudyAppCore.createResultHistory({
      target: '#resultHistory',
      limit: 6
    });
    let expAwarded = false;
    let words = [];
    let index = 0;
    let running = false;
    let timerId = null;
    let currentPassage = null;
    let answered = false;
    let resetTimerId = null;
    let ready = false;
    let loadError = "";
    let currentCategoryIndex = -1;
    let categoryPool = [];
    let remainingItemIndices = [];
    let cycleCount = 0;
    let completedInCategory = 0;

    function wpmToIntervalMs(wpm) {
      return 60000 / Math.max(1, wpm);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function mix(from, to, ratio) {
      return from + (to - from) * ratio;
    }

    function rewardForWpm(wpm) {
      const speed = SPEED_REWARD_CONFIG.speed;
      const reward = SPEED_REWARD_CONFIG.reward;
      const ratio = clamp((Number(wpm) - speed.minWpm) / (speed.maxWpm - speed.minWpm), 0, 1);
      return {
        exp: Math.max(1, Math.round(mix(reward.minExp, reward.maxExp, ratio))),
        dropChance: mix(reward.minDropChance, reward.maxDropChance, ratio),
        rankWeights: [
          100,
          mix(reward.rank2Weight[0], reward.rank2Weight[1], ratio),
          mix(reward.rank3Weight[0], reward.rank3Weight[1], ratio * ratio),
          mix(reward.rank4Weight[0], reward.rank4Weight[1], ratio * ratio * ratio),
        ],
      };
    }

    function setWpm(value) {
      const speed = SPEED_REWARD_CONFIG.speed;
      speedSlider.value = String(Math.round(
        clamp(Number(value) || speed.defaultWpm, speed.minWpm, speed.maxWpm)
      ));
      updateSpeedLabel();
    }

    function adjustWpm(delta) {
      setWpm(Number(speedSlider.value) + Number(delta || 0));
    }

    function updateSpeedLabel() {
      const wpm = Number(speedSlider.value);
      speedLabel.textContent = wpm + " wpm";
      if (running) startTimer();
    }

    function updateDisplay() {
      if (!ready) {
        wordDisplay.textContent = loadError ? "読込失敗" : "loading…";
        progressLabel.textContent = "0 / 0";
        return;
      }
      if (!words.length) {
        wordDisplay.textContent = "開始";
        progressLabel.textContent = "0 / 0";
        return;
      }
      const current = Math.min(index + 1, words.length);
      wordDisplay.textContent = words[index] || "";
      progressLabel.textContent = current + " / " + words.length;
    }

    function updateCategoryMeta() {
      const group = questionGroups[currentCategoryIndex];
      const completed = Math.min(completedInCategory, 3);
      if (categoryLabel) categoryLabel.textContent = group?.subject || "--";
      if (totalCount) totalCount.textContent = `全${group?.items?.length || 0}問`;
      if (countLabel) countLabel.textContent = `${Math.min(cycleCount, 3)} / 3`;
      if (progressFill) progressFill.style.width = `${(completed / 3) * 100}%`;
      if (progressTrack) {
        progressTrack.setAttribute("aria-valuenow", String(completed));
        progressTrack.setAttribute("aria-valuetext", `${completed}問解答済み`);
      }
      if (randomBtn) randomBtn.disabled = !ready;
    }

    function selectRandomCategory(exceptIndex = currentCategoryIndex) {
      if (!questionGroups.length) return;
      if (!categoryPool.length || categoryPool.some((value) => value < 0 || value >= questionGroups.length)) {
        categoryPool = questionGroups.map((_group, index) => index);
      }
      let candidates = categoryPool.filter((value) => questionGroups.length === 1 || value !== exceptIndex);
      if (!candidates.length) {
        categoryPool = questionGroups.map((_group, index) => index);
        candidates = categoryPool.filter((value) => questionGroups.length === 1 || value !== exceptIndex);
      }
      const selected = candidates[Math.floor(Math.random() * candidates.length)] ?? 0;
      categoryPool = categoryPool.filter((value) => value !== selected);
      currentCategoryIndex = selected;
      remainingItemIndices = questionGroups[selected].items.map((_item, index) => index);
      cycleCount = 0;
      completedInCategory = 0;
      updateCategoryMeta();
    }

    function isQuizVisible() {
      return !!(quizArea && quizArea.classList.contains("is-visible"));
    }

    function updateStartable() {
      const canStart = ready && !running && !answered && !isQuizVisible();
      if (wordBox) wordBox.classList.toggle("is-startable", canStart);
    }

    function normalizePassage(entry, subject = "") {
      if (Array.isArray(entry)) {
        return {
          text: String(entry[0] || ""),
          choices: Array.isArray(entry[1]) ? entry[1].map(String).filter(Boolean) : [],
          subject: String(subject || entry[2] || "")
        };
      }
      if (entry && typeof entry === "object") {
        return {
          text: String(entry.text || ""),
          choices: Array.isArray(entry.choices) ? entry.choices.map(String).filter(Boolean) : [],
          subject: String(entry.subject || subject || "")
        };
      }
      return { text: String(entry || ""), choices: [], subject: String(subject || "") };
    }

    function readGlobal(name) {
      try {
        return (0, eval)(name);
      } catch (_error) {
        return undefined;
      }
    }

    function injectScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`load failed: ${src}`));
        document.head.appendChild(script);
      });
    }

    function toVariableSuffix(value) {
      return String(value).replace(/[^A-Za-z0-9_$\u0080-\uFFFF]/g, "_");
    }

    async function loadQuestionBank() {
      const entries = typeof files_qaSpeedReading !== "undefined" && Array.isArray(files_qaSpeedReading)
        ? files_qaSpeedReading
        : [];
      try {
        const groups = await Promise.all(entries.map(async (entry) => {
          const subject = String(Array.isArray(entry) ? entry[0] : entry).trim();
          if (!subject) return null;
          await injectScript(encodeURI(`../qa_speed_reading/${subject}.js`));
          const raw = readGlobal(`qaSpeedReading_${toVariableSuffix(subject)}`);
          if (!Array.isArray(raw)) throw new Error(`${subject}.js に問題がありません`);
          const items = raw.map((item) => normalizePassage(item, subject)).filter((item) =>
            item.text && item.choices.length === 4 && new Set(item.choices).size === 4
          );
          return items.length ? { subject, items } : null;
        }));
        questionGroups = groups.filter(Boolean);
        if (!questionGroups.length) throw new Error("有効な問題がありません");
        ready = true;
      } catch (error) {
        console.error(error);
        const items = fallbackPassages.map((item) => normalizePassage(item, "英語"));
        questionGroups = items.length ? [{ subject: "英語", items }] : [];
        ready = questionGroups.length > 0;
        loadError = ready ? "" : String(error?.message || error);
      }
      if (ready) selectRandomCategory(-1);
      updateDisplay();
      updateCategoryMeta();
      updateStartable();
    }

    function hideQuiz() {
      answered = false;
      if (quizArea) quizArea.classList.remove("is-visible");
      if (wordArea) wordArea.style.display = "flex";
      if (choicesEl) choicesEl.innerHTML = "";
      if (feedbackEl) feedbackEl.textContent = "";
      updateStartable();
    }

    function showQuiz() {
      if (!currentPassage || !currentPassage.choices.length) return;
      const correct = currentPassage.choices[0];
      const choices = window.StudyAppCore.shuffle(currentPassage.choices.slice(0, 4));

      if (wordArea) wordArea.style.display = "none";
      if (quizArea) quizArea.classList.add("is-visible");
      if (feedbackEl) feedbackEl.textContent = "";
      updateStartable();
      if (!choicesEl) return;

      choicesEl.innerHTML = "";
      choices.forEach((choice) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn";
        btn.textContent = choice;
        btn.addEventListener("click", () => answerChoice(btn, choice === correct));
        choicesEl.appendChild(btn);
      });
    }

    function answerChoice(selectedBtn, isCorrect) {
      if (answered) return;
      answered = true;
      completedInCategory = Math.min(cycleCount, 3);
      updateCategoryMeta();
      selectedBtn.blur();
      updateStartable();

      const buttons = Array.from(choicesEl.querySelectorAll(".choice-btn"));
      buttons.forEach((btn) => {
        btn.disabled = true;
        if (btn.textContent === currentPassage.choices[0]) btn.classList.add("is-correct");
      });

      if (isCorrect) {
        selectedBtn.classList.add("is-correct");
        let gain = 0;
        if (!expAwarded) {
          const reward = rewardForWpm(speedSlider.value);
          gain = reward.exp;
          expAwarded = true;
          rewards.award(reward);
        }
        adjustWpm(SPEED_REWARD_CONFIG.speed.correctDeltaWpm);
        feedbackEl.textContent = "🎉 正解";
        results.add(true, `🎉 正解 +${gain} EXP`);
      } else {
        selectedBtn.classList.add("is-wrong");
        adjustWpm(-SPEED_REWARD_CONFIG.speed.wrongDeltaWpm);
        feedbackEl.textContent = "✖ 不正解";
        results.add(false, "✖ 不正解 +0 EXP");
      }
      resetTimerId = setTimeout(resetToStart, 1400);
    }

    function resetToStart() {
      if (resetTimerId) {
        clearTimeout(resetTimerId);
        resetTimerId = null;
      }
      running = false;
      if (timerId) {
        clearTimeout(timerId);
        timerId = null;
      }
      rewards.hide();
      answered = false;
      words = [];
      index = 0;
      currentPassage = null;
      hideQuiz();
      updateDisplay();
      updateStartable();
    }

    function setWordsFromPassage(passage) {
      currentPassage = passage;
      words = (passage.text || "").split(/\s+/).filter(Boolean);
      index = 0;
      expAwarded = false;
      hideQuiz();
      updateDisplay();
    }

    function pickRandomPassage() {
      if (!questionGroups.length) return { text: "", choices: [], subject: "" };
      if (currentCategoryIndex < 0 || cycleCount >= 3 || !remainingItemIndices.length) {
        selectRandomCategory(currentCategoryIndex);
      }
      const group = questionGroups[currentCategoryIndex];
      if (!group || !remainingItemIndices.length) return { text: "", choices: [], subject: "" };
      const queueIndex = Math.floor(Math.random() * remainingItemIndices.length);
      const itemIndex = remainingItemIndices.splice(queueIndex, 1)[0];
      cycleCount += 1;
      updateCategoryMeta();
      return group.items[itemIndex];
    }

    function switchCategory() {
      if (!ready || !questionGroups.length) return;
      resetToStart();
      selectRandomCategory(currentCategoryIndex);
    }

    function advance() {
      if (!running || !words.length) return;
      index++;
      if (index >= words.length) {
        stop();
        index = Math.max(0, words.length - 1);
        showQuiz();
      }
      updateDisplay();
    }

    function startTimer() {
      if (timerId) {
        clearTimeout(timerId);
        timerId = null;
      }
      if (!running || !words.length) return;

      const interval = wpmToIntervalMs(Number(speedSlider.value));
      timerId = setTimeout(function tick() {
        if (!running || !words.length) return;
        advance();
        if (!running || !words.length) return;
        timerId = setTimeout(tick, wpmToIntervalMs(Number(speedSlider.value)));
      }, interval);
    }

    function play() {
      if (!ready || running || answered || isQuizVisible()) return;
      window.StudyAppCore.blurActiveElement();
      rewards.hide();
      if (resetTimerId) {
        clearTimeout(resetTimerId);
        resetTimerId = null;
      }
      setWordsFromPassage(pickRandomPassage());
      if (!words.length) return;

      running = true;
      if (index >= words.length) {
        index = 0;
        expAwarded = false;
      }
      updateDisplay();
      updateStartable();
      startTimer();
    }

    function stop() {
      running = false;
      if (timerId) {
        clearTimeout(timerId);
        timerId = null;
      }
      updateDisplay();
      updateStartable();
    }

    // UI events
    wordBox.addEventListener("click", (e) => {
      if (e.target.closest("button, input, label, a, .flashcard-category-row")) return;
      play();
    });

    speedSlider.addEventListener("input", updateSpeedLabel);
    randomBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      switchCategory();
    });

    // Key controls
    document.addEventListener("keydown", (e) => {
      // Space: play, ↑↓: speed
      if (e.code === "Space") {
        e.preventDefault();
        play();
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        adjustWpm(SPEED_REWARD_CONFIG.speed.keyboardDeltaWpm);
      } else if (e.key === "ArrowDown") {
        e.preventDefault();
        adjustWpm(-SPEED_REWARD_CONFIG.speed.keyboardDeltaWpm);
      }
    });

    // 初期化
    speedSlider.min = String(SPEED_REWARD_CONFIG.speed.minWpm);
    speedSlider.max = String(SPEED_REWARD_CONFIG.speed.maxWpm);
    speedSlider.step = "1";
    speedSlider.value = String(SPEED_REWARD_CONFIG.speed.defaultWpm);
    updateSpeedLabel();
    updateDisplay();
    updateCategoryMeta();
    updateStartable();
    loadQuestionBank();
  </script>
</body>
</html>
