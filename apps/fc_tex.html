<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>各科目 フラッシュカード</title>
  <link rel="stylesheet" href="./lib/app_world_ui.css" />
  <link rel="stylesheet" href="./lib/flashcard_shared.css" />
  <script>
    window.MathJax = {
      tex: { inlineMath: [["$", "$"], ["\\(", "\\)"]] },
      svg: { fontCache: "global" }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body class="world-app" data-app="fc-tex" data-flashcard-app>
  <header class="topbar flashcard-topbar">
    <div class="topbar-inner flashcard-topbar-inner">
      <div class="flashcard-title">
        各科目 <span class="flashcard-title-accent">フラッシュカード</span>
      </div>
      <div class="spacer"></div>
      <a class="back-link flashcard-back" href="../index.html" aria-label="トップへ戻る">← 戻る</a>
    </div>
  </header>

  <main class="page flashcard-page">
    <section class="flashcard-shell" id="flashcard" role="button" tabindex="0"
      aria-live="polite" aria-busy="false" aria-label="問題カード。押すと答えを表示します">
      <div class="category-row flashcard-category-row" aria-label="カテゴリと進捗">
        <div class="flashcard-category-main">
          <div class="flashcard-category-label">カテゴリ</div>
          <div id="totalCount" class="flashcard-category-count">全0問</div>
          <div id="categoryLabel" class="flashcard-category-name">--</div>
        </div>
        <div class="flashcard-category-actions">
          <div class="flashcard-meta-pill">
            <span class="flashcard-meta-label">QUEST</span>
            <span id="countLabel">0 / 3</span>
            <div id="progressTrack" class="flashcard-progress-track" role="progressbar"
              aria-label="解答済みの進捗" aria-valuemin="0" aria-valuemax="3" aria-valuenow="0">
              <div id="progressFill" class="flashcard-progress-fill"></div>
            </div>
          </div>
          <button id="randomBtn" class="flashcard-switch" type="button"
            aria-label="別のカテゴリへランダムに切り替える">
            <span class="flashcard-switch-icon" aria-hidden="true">🎲</span>
            <span class="flashcard-switch-label">切り替え</span>
          </button>
        </div>
      </div>

      <div class="tex-card-body">
        <div class="tex-card-section" data-label="QUESTION">
          <div class="tex-card-content" id="problemQuestion"></div>
        </div>
        <div class="tex-card-section" data-label="ANSWER">
          <div class="tex-card-content tex-card-answer is-hidden" id="problemAnswer"></div>
        </div>
      </div>
    </section>
    <div id="rewardSlot"></div>
  </main>

  <script src="../qa_tex/files.js"></script>
  <script src="./lib/rpg_progression.js"></script>
  <script src="./lib/rpg_equipment.js"></script>
  <script src="./lib/rpg_study_rewards.js"></script>
  <script src="./lib/flashcard_core.js"></script>
  <script>
    (() => {
      "use strict";

      const fallbackProblems = [
        ["\\(x^2\\) の微分は？", "\\(2x\\)"],
        ["\\(\\int_0^1 x\\,dx\\) は？", "\\(\\frac{1}{2}\\)"],
        ["\\(\\sin^2 x + \\cos^2 x\\) は？", "\\(1\\)"],
      ];
      const question = document.getElementById("problemQuestion");
      const answer = document.getElementById("problemAnswer");

      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      async function waitForMathJax(maxMs = 5000) {
        const startedAt = performance.now();
        while (performance.now() - startedAt < maxMs) {
          if (window.MathJax?.typesetPromise && window.MathJax?.startup?.promise) {
            await window.MathJax.startup.promise;
            return window.MathJax;
          }
          await delay(25);
        }
        return null;
      }

      async function typeset(elements) {
        const mathJax = await waitForMathJax();
        if (!mathJax) return;
        if (mathJax.typesetClear) mathJax.typesetClear(elements);
        await mathJax.typesetPromise(elements);
      }

      FlashcardCore.create({
        rewardIcon: "📖",
        reward: {
          exp: 1,
          dropChance: 1 / 3,
          rankWeights: [1],
        },
        getFiles() {
          return typeof files_qaMath !== "undefined" && Array.isArray(files_qaMath)
            ? files_qaMath
            : [];
        },
        async loadCategory(name, helpers) {
          if (name === "stub") throw new Error("qa_tex/files.js にカテゴリがありません");
          const base = String(name).replace(/\.js$/i, "");
          const variableBase = base.split(/[\\/]/).pop();
          await helpers.injectScript(encodeURI(`../qa_tex/${base}.js`));
          const items = helpers.readGlobal(`qa_${variableBase}`);
          if (!Array.isArray(items) || !items.length) {
            throw new Error(`qa_tex/${base}.js にカードがありません`);
          }
          return { category: base, items };
        },
        getFallback(error) {
          console.warn(error);
          return { category: "stub", items: fallbackProblems };
        },
        getRevealTotal: () => 1,
        renderLoading() {
          question.textContent = "loading…";
          answer.textContent = "";
          answer.classList.add("is-hidden");
        },
        renderEmpty() {
          question.textContent = "…";
          answer.textContent = "";
          answer.classList.add("is-hidden");
        },
        async renderItem({ item, revealStep }) {
          question.textContent = String(item?.[0] ?? "");
          answer.textContent = String(item?.[1] ?? "");
          answer.classList.toggle("is-hidden", revealStep < 1);
          await typeset([question, answer]);
        },
      });
    })();
  </script>
</body>
</html>
