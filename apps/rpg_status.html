<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>キャラステータス</title>
<style>
  :root{
    --fg:#e5e7eb;
    --hp:#ef4444; --hp2:#b91c1c;
    --exp:#38bdf8; --exp2:#0ea5e9;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;
    background:#020617;
    color:var(--fg);
  }
  body{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:8px;
    background-image:url('../img/街_農場_夜.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    text-shadow:0 2px 5px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.65);
  }
  .page{
    width:100%;
    min-height:calc(100dvh - 16px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  #panel{
    width:min(720px, calc(100vw - 16px));
    background:rgba(15,23,42,.36);
    border-radius:16px;
    border:1px solid rgba(148,163,184,.35);
    box-shadow:0 14px 34px rgba(0,0,0,.34);
    padding:clamp(12px, 2.4vw, 18px);
  }
  header{
    width:100%;
    max-width:min(720px, calc(100vw - 16px));
    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  h1{
    font-size:clamp(22px, 6vw, 32px);
    letter-spacing:.06em;
    margin:0;
  }
  #backBtn{
    padding:4px 10px;
    border-radius:999px;
    border:0;
    background:rgba(15,23,42,.46);
    color:var(--fg);
    font-size:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:4px;
  }
  #backBtn span{font-size:14px}

  /* 上部ステータス */
  .meta{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-bottom:10px;
  }
  .pill{
    padding:6px 10px;
    border-radius:999px;
    background:rgba(15,23,42,.42);
    border:1px solid rgba(148,163,184,.5);
    font-size:12px;
    display:flex;
    justify-content:space-between;
    gap:8px;
    font-variant-numeric:tabular-nums;
  }
  .pill span:first-child{opacity:.8}

  .row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
    font-size:13px;
  }
  .label{width:64px;opacity:.8}
  .barWrap{
    flex:1;
    height:12px;
    border-radius:999px;
    overflow:hidden;
    background:#020617;
    border:1px solid #020617;
  }
  .barInner{height:100%;width:0;transition:width .25s}
  .barHp{background:linear-gradient(90deg,var(--hp),var(--hp2))}
  .barExp{background:linear-gradient(90deg,var(--exp),var(--exp2))}
  .barText{
    min-width:110px;
    text-align:right;
    font-size:11px;
    opacity:.9;
    font-variant-numeric:tabular-nums
  }

  .avatarRow{
    display:grid;
    grid-template-columns:minmax(0, 1fr) minmax(240px, 280px);
    align-items:start;
    gap:14px;
    margin-top:10px;
  }
  /* キャラ画像：中央・大きめ（正方形想定） */
  .avatarWrap{
    display:flex;
    justify-content:center;
    flex:1;
  }
  .avatar{
    width:min(100%, 420px);
    aspect-ratio:1/1;
    border-radius:16px;
    overflow:hidden;
    border:1px solid rgba(148,163,184,.55);
    background:rgba(2,6,23,.28);
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .buildPanel{display:grid;gap:10px}
  .atkBox{
    border:1px solid rgba(103,232,249,.42);
    border-radius:14px;
    padding:10px 12px;
    background:linear-gradient(135deg,rgba(8,47,73,.62),rgba(15,23,42,.34));
  }
  .atkMain{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .atkMain span{font-size:12px;letter-spacing:.14em;color:#a5f3fc}
  .atkMain strong{font-size:30px;line-height:1;color:#fef3c7}
  #atkDetail{display:block;margin-top:5px;font-size:11px;color:#cbd5e1;text-align:right}
  .itemBag{
    border:1px solid rgba(148,163,184,.32);
    border-radius:14px;
    padding:10px;
    background:rgba(2,6,23,.34);
  }
  .bagHead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
  .bagHead h2{font-size:14px;letter-spacing:.06em;margin:0}
  #bagCount{font-size:11px;color:#94a3b8;font-variant-numeric:tabular-nums}
  .equipped{
    display:grid;
    grid-template-columns:36px minmax(0,1fr) auto;
    align-items:center;
    gap:8px;
    min-height:54px;
    margin-bottom:8px;
    padding:7px 8px;
    border-radius:10px;
    border:1px solid rgba(250,204,21,.32);
    background:linear-gradient(100deg,rgba(120,53,15,.3),rgba(15,23,42,.28));
  }
  .equippedIcon{font-size:26px;text-align:center;filter:drop-shadow(0 0 8px rgba(250,204,21,.35))}
  .equippedName{display:block;font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .equippedRank{display:block;margin-top:2px;font-size:10px;color:#fde68a;letter-spacing:.08em}
  .equippedBonus{font-size:12px;font-weight:800;color:#86efac;white-space:nowrap}
  .emptyEquipment .equippedBonus{color:#94a3b8}
  .weaponGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px}
  .weaponSlot{
    position:relative;
    min-width:0;
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:9px;
    border:1px solid rgba(148,163,184,.2);
    background:rgba(15,23,42,.42);
    color:#64748b;
  }
  .weaponSlot.owned{border-color:rgba(103,232,249,.44);background:rgba(8,47,73,.38);color:#fff}
  .slotIcon{font-size:23px;filter:grayscale(1);opacity:.34}
  .owned .slotIcon{filter:none;opacity:1}
  .slotRank{position:absolute;top:3px;left:5px;font-size:9px;letter-spacing:.06em;color:#94a3b8}
  .slotCount{position:absolute;right:4px;bottom:3px;min-width:17px;padding:1px 4px;border-radius:999px;background:rgba(2,6,23,.82);font-size:10px;text-align:center;font-variant-numeric:tabular-nums}
  .bagNote{margin:7px 0 0;font-size:10px;color:#94a3b8;text-align:center}
  @media (max-width: 640px){
    .avatarRow{grid-template-columns:1fr}
    .buildPanel{grid-template-columns:minmax(0,1fr) minmax(220px,1.25fr)}
  }
  @media (max-width: 520px){
    .buildPanel{grid-template-columns:1fr}
    .avatar{width:min(100%, 360px)}
  }
</style>
</head>

<body>
<div class="page">
  <header>
    <h1>キャラステータス</h1>
    <button id="backBtn" type="button"><span>◀</span> ゲームにもどる</button>
  </header>

  <section id="panel">

    <!-- ステータス（キャラの上部） -->
    <div class="meta">
      <div class="pill"><span>Lv</span><span id="lv">1</span></div>
      <div class="pill"><span>総EXP</span><span id="totalExp">0</span></div>
      <div class="pill"><span>次Lvまで</span><span id="toNext">20</span></div>
    </div>

    <div class="row">
      <span class="label">EXP</span>
      <div class="barWrap"><div id="expBar" class="barInner barExp"></div></div>
      <span id="expText" class="barText">0 / 20</span>
    </div>

    <div class="row">
      <span class="label">HP</span>
      <div class="barWrap"><div id="hpBar" class="barInner barHp"></div></div>
      <span id="hpText" class="barText">30 / 30</span>
    </div>

    <!-- キャラ（中央） -->
    <div class="avatarRow">
      <div class="avatarWrap">
        <div class="avatar">
          <img src="../img/rpg_player_character.png" alt="player character">
        </div>
      </div>
      <aside class="buildPanel" aria-label="装備とアイテムバッグ">
        <div class="atkBox">
          <div class="atkMain"><span>ATK</span><strong id="atk">5</strong></div>
          <small id="atkDetail">基礎 5</small>
        </div>

        <section class="itemBag">
          <div class="bagHead">
            <h2>🎒 アイテムバッグ</h2>
            <span id="bagCount">所持 0</span>
          </div>
          <div id="equippedWeapon" class="equipped emptyEquipment">
            <span class="equippedIcon">◌</span>
            <span><strong class="equippedName">装備なし</strong><small class="equippedRank">AUTO EQUIP</small></span>
            <strong class="equippedBonus">ATK +0%</strong>
          </div>
          <div id="weaponGrid" class="weaponGrid" aria-label="武器一覧"></div>
          <p class="bagNote">同じランクが3個そろうと自動強化</p>
        </section>
      </aside>
    </div>

  </section>
</div>

<script src="./rpg_equipment.js"></script>
<script>
  const KEY = 'midunohi.exam.exp';
  const $ = (id)=>document.getElementById(id);
  const clamp = (x,a,b)=>Math.max(a,Math.min(b,x));
  const setBar = (el,r)=>el && (el.style.width=(100*clamp(r,0,1)).toFixed(1)+'%');

  let lv, exp, nextExp, maxHP, atk, totalExp;

  const reset = ()=>{ lv=1; exp=0; nextExp=20; atk=5; maxHP=30; };
  const levelUp = ()=>{
    lv++;
    maxHP += 8 + Math.floor(lv*1.5);
    atk += 2;
    nextExp = Math.round(nextExp*1.35);
  };

  const load = ()=>{
    totalExp = Number(localStorage.getItem(KEY) || '0');
    if(!Number.isFinite(totalExp) || totalExp < 0) totalExp = 0;

    reset();
    let rest = totalExp;
    while(rest >= nextExp){ rest -= nextExp; levelUp(); }
    exp = rest;
  };

  const render = ()=>{
    const equipment = window.RPGEquipment;
    const attack = equipment
      ? equipment.getAttackStats(atk)
      : { base:atk, bonus:0, total:atk, equipped:null };

    $('lv').textContent = lv;
    $('atk').textContent = attack.total;
    $('atkDetail').textContent = attack.bonus > 0
      ? `基礎 ${attack.base} + 装備 ${attack.bonus}`
      : `基礎 ${attack.base}`;
    $('totalExp').textContent = totalExp;

    $('expText').textContent = `${exp} / ${nextExp}`;
    $('hpText').textContent = `${maxHP} / ${maxHP}`;
    $('toNext').textContent = Math.max(0, nextExp - exp);

    setBar($('expBar'), exp / nextExp);
    setBar($('hpBar'), 1);

    renderEquipment(equipment, attack.equipped);
  };

  const renderEquipment = (equipment, equipped)=>{
    const inventory = equipment ? equipment.getInventory() : [];
    const total = inventory.reduce((sum, weapon)=>sum + weapon.count, 0);
    $('bagCount').textContent = `所持 ${total}`;

    const equippedEl = $('equippedWeapon');
    equippedEl.classList.toggle('emptyEquipment', !equipped);
    equippedEl.querySelector('.equippedIcon').textContent = equipped ? equipped.icon : '◌';
    equippedEl.querySelector('.equippedName').textContent = equipped ? equipped.name : '装備なし';
    equippedEl.querySelector('.equippedRank').textContent = equipped ? `RANK ${equipped.rank}・AUTO EQUIP` : 'AUTO EQUIP';
    equippedEl.querySelector('.equippedBonus').textContent = equipped ? `ATK +${equipped.atkBonusPct}%` : 'ATK +0%';

    const grid = $('weaponGrid');
    grid.replaceChildren();
    inventory.forEach((weapon)=>{
      const slot = document.createElement('div');
      slot.className = `weaponSlot${weapon.count ? ' owned' : ''}`;
      slot.title = `${weapon.name} / ATK +${weapon.atkBonusPct}%`;
      slot.innerHTML = `<span class="slotRank">R${weapon.rank}</span><span class="slotIcon">${weapon.icon}</span><span class="slotCount">${weapon.count}</span>`;
      grid.appendChild(slot);
    });
  };

  const init = ()=>{
    load(); render();
    $('backBtn').addEventListener('click', ()=>{
      location.href = '../index.html';
    });
  };
  window.addEventListener('storage', ()=>{ load(); render(); });
  window.addEventListener('rpg-equipment-change', render);
  init();
</script>
</body>
</html>
