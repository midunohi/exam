<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>キャラステータス</title>
<style>
  :root{
    --fg:#e5e7eb;
    --muted:#a9b7ca;
    --hp:#ef4444;
    --hp2:#b91c1c;
    --exp:#38bdf8;
    --exp2:#0ea5e9;
    --status-line:rgba(148,163,184,.24);
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;
    min-height:100%;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;
    background:#020617;
    color:var(--fg);
  }
  body{
    min-height:100vh;
    min-height:100dvh;
    padding:8px;
    background-image:url('../img/街_農場_夜.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    text-shadow:0 2px 5px rgba(0,0,0,.9),0 0 12px rgba(0,0,0,.65);
  }
  button{font:inherit}
  .page{
    width:100%;
    min-height:calc(100dvh - 16px);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  header{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  h1{margin:0;letter-spacing:.06em}
  #backBtn{color:var(--fg);cursor:pointer}
  #panel{
    width:min(960px,calc(100vw - 16px));
    overflow:hidden;
  }
  .statusLayout{
    display:grid;
    grid-template-columns:minmax(260px,.86fr) minmax(420px,1.14fr);
  }
  .categorySection{
    position:relative;
    min-width:0;
    padding:clamp(30px,3.4vw,34px) clamp(14px,2.5vw,22px) clamp(14px,2.5vw,22px);
  }
  .sectionHeading{
    position:absolute;
    top:9px;
    left:clamp(14px,2.5vw,22px);
    margin:0;
    color:rgba(203,213,225,.52);
    font-size:9px;
    font-weight:800;
    line-height:1;
    letter-spacing:.2em;
    text-transform:uppercase;
  }
  .characterSection{
    display:flex;
    min-height:100%;
    flex-direction:column;
    border-right:1px solid var(--status-line);
  }
  .avatarWrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .avatar{
    width:min(100%,390px);
    aspect-ratio:1;
    overflow:hidden;
    border-radius:12px;
    background:rgba(2,6,23,.14);
    box-shadow:0 14px 34px rgba(0,0,0,.24);
  }
  .avatar img{display:block;width:100%;height:100%;object-fit:cover}
  .detailsColumn{min-width:0}
  .statsSection{border-bottom:1px solid var(--status-line)}
  .meta{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    margin:0 0 14px;
    border-block:1px solid var(--status-line);
  }
  .pill{
    min-width:0;
    padding:8px 10px;
    display:flex;
    justify-content:space-between;
    gap:8px;
    border-right:1px solid var(--status-line);
    font-size:12px;
    font-variant-numeric:tabular-nums;
  }
  .pill:last-child{border-right:0}
  .pill span:first-child{color:var(--muted)}
  .vitals{display:grid;gap:9px}
  .row{
    display:grid;
    grid-template-columns:48px minmax(0,1fr) 94px;
    align-items:center;
    gap:9px;
    font-size:13px;
  }
  .label{color:var(--muted);font-weight:700;letter-spacing:.06em}
  .barWrap{
    height:10px;
    overflow:hidden;
    border-radius:999px;
    background:rgba(2,6,23,.65);
    box-shadow:inset 0 0 0 1px rgba(148,163,184,.12);
  }
  .barInner{height:100%;width:0;transition:width .25s}
  .barHp{background:linear-gradient(90deg,var(--hp),var(--hp2))}
  .barExp{background:linear-gradient(90deg,var(--exp),var(--exp2))}
  .barText{text-align:right;color:#dbeafe;font-size:11px;font-variant-numeric:tabular-nums}
  .atkBox{
    display:flex;
    align-items:end;
    justify-content:space-between;
    gap:14px;
    margin-top:14px;
    padding-top:12px;
    border-top:1px solid var(--status-line);
  }
  .atkMain{display:flex;align-items:baseline;gap:10px}
  .atkMain span{color:#a5f3fc;font-size:11px;font-weight:800;letter-spacing:.16em}
  .atkMain strong{color:#fef3c7;font-size:30px;line-height:1}
  #atkDetail{color:#cbd5e1;font-size:11px;text-align:right}
  .equipmentLayout{
    display:grid;
    grid-template-columns:minmax(160px,.82fr) minmax(190px,1.18fr);
    align-items:stretch;
  }
  .equipmentPanel{min-width:0;padding-right:16px}
  .itemBag{min-width:0;padding-left:16px;border-left:1px solid var(--status-line)}
  .subsectionHeading{
    margin:0 0 10px;
    color:#fde68a;
    font-size:12px;
    letter-spacing:.08em;
  }
  .bagHead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .bagHead .subsectionHeading{margin:0}
  #bagCount{color:#94a3b8;font-size:11px;font-variant-numeric:tabular-nums}
  .equipped{
    display:grid;
    grid-template-columns:36px minmax(0,1fr) auto;
    align-items:center;
    gap:8px;
    min-height:54px;
  }
  .equippedIcon{font-size:26px;text-align:center;filter:drop-shadow(0 0 8px rgba(250,204,21,.35))}
  .equippedName{display:block;overflow:hidden;color:#f8fafc;font-size:12px;text-overflow:ellipsis;white-space:nowrap}
  .equippedRank{display:block;margin-top:2px;color:#fde68a;font-size:9px;letter-spacing:.08em}
  .equippedBonus{color:#86efac;font-size:12px;white-space:nowrap}
  .emptyEquipment .equippedBonus{color:#94a3b8}
  .weaponGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
  .weaponSlot{
    position:relative;
    min-width:0;
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid rgba(103,232,249,.34);
    border-radius:8px;
    background:rgba(8,47,73,.28);
    color:#fff;
  }
  .slotIcon{font-size:23px}
  .slotRank{position:absolute;top:3px;left:5px;color:#94a3b8;font-size:9px;letter-spacing:.06em}
  .slotCount{position:absolute;right:4px;bottom:3px;min-width:17px;padding:1px 4px;border-radius:999px;background:rgba(2,6,23,.82);font-size:10px;text-align:center;font-variant-numeric:tabular-nums}
  .bagEmpty{grid-column:1/-1;margin:8px 0;padding:8px 0;color:#94a3b8;font-size:11px;text-align:center}
  .bagNote{margin:9px 0 0;color:#94a3b8;font-size:10px;line-height:1.5;text-align:center}
  @media(max-width:760px){
    .statusLayout{grid-template-columns:1fr}
    .characterSection{border-right:0;border-bottom:1px solid var(--status-line)}
    .avatar{width:min(100%,360px)}
  }
  @media(max-width:520px){
    .categorySection{padding:28px 12px 14px}
    .sectionHeading{top:9px;left:12px}
    .row{grid-template-columns:38px minmax(0,1fr) 78px;gap:7px}
    .equipmentLayout{grid-template-columns:1fr}
    .equipmentPanel{padding:0 0 13px}
    .itemBag{padding:13px 0 0;border-top:1px solid var(--status-line);border-left:0}
  }
</style>
<link rel="stylesheet" href="./lib/app_world_ui.css" />
<style>
  /* Four related areas, rearranged by the viewport aspect ratio. */
  html,body{width:100%;height:100%;overflow:hidden}
  body{padding:6px}
  .page{
    height:100vh;
    height:100svh;
    min-height:0!important;
    padding-top:calc(var(--world-topbar-height) + 8px)!important;
  }
  #panel{
    height:calc(100svh - var(--world-topbar-height) - 14px);
    max-height:calc(100svh - var(--world-topbar-height) - 14px);
    overflow:hidden;
  }
  .statusLayout{width:100%;height:100%;min-height:0;display:grid}
  .statusLayout>.categorySection{min-width:0;min-height:0;overflow:hidden}
  .characterSection{grid-area:character;display:flex;border:0}
  .statsSection{grid-area:stats;border:0}
  .equipmentPanel{grid-area:equipment;border:0}
  .itemBag{grid-area:bag;border:0}
  .avatarWrap{width:100%;height:100%;min-height:0}
  .avatar{width:100%;height:100%;max-width:100%;aspect-ratio:auto}
  .avatar img{object-fit:cover}

  /* Tall and square-ish: CHARACTER | STATUS / EQUIPMENT | ITEM BAG. */
  @media (max-aspect-ratio:4/3){
    .page{align-items:flex-start}
    .statusLayout{
      grid-template-areas:
        "character stats"
        "equipment bag";
      grid-template-columns:minmax(0,42fr) minmax(0,58fr);
      grid-template-rows:clamp(150px,42vw,260px) minmax(0,1fr);
    }
    .characterSection{border-right:1px solid var(--status-line);border-bottom:1px solid var(--status-line)}
    .statsSection{border-bottom:1px solid var(--status-line)}
    .equipmentPanel{border-right:1px solid var(--status-line)}
    .categorySection{padding:26px 10px 9px}
    .sectionHeading{top:8px;left:10px}
    .meta{margin-bottom:8px}
    .pill{padding:5px 6px;font-size:10px}
    .vitals{gap:6px}
    .row{grid-template-columns:34px minmax(0,1fr) 68px;gap:5px;font-size:11px}
    .atkBox{margin-top:8px;padding-top:7px}
    .atkMain strong{font-size:24px}
    .subsectionHeading,.bagHead{margin-bottom:7px}
    .equipped{grid-template-columns:28px minmax(0,1fr);gap:5px;min-height:44px}
    .equippedIcon{font-size:21px}
    .equippedBonus{grid-column:1/-1;text-align:center}
    .weaponGrid{gap:4px}
    .bagNote{margin-top:6px;line-height:1.25}
  }

  /* Wide: STATUS over CHARACTER | EQUIPMENT | ITEM BAG. */
  @media (min-aspect-ratio:4/3){
    .statusLayout{
      grid-template-areas:
        "stats equipment bag"
        "character equipment bag";
      grid-template-columns:minmax(230px,34fr) minmax(180px,25fr) minmax(260px,41fr);
      grid-template-rows:auto minmax(0,1fr);
    }
    .statsSection{border-right:1px solid var(--status-line);border-bottom:1px solid var(--status-line)}
    .characterSection{border-right:1px solid var(--status-line)}
    .equipmentPanel{border-right:1px solid var(--status-line)}
    .categorySection{padding:27px 12px 10px}
    .sectionHeading{top:8px;left:12px}
    .equipmentPanel,.itemBag{display:flex;flex-direction:column}
    .equipped{grid-template-columns:34px minmax(0,1fr);align-content:start}
    .equippedBonus{grid-column:1/-1;text-align:center}
    .weaponGrid{grid-template-columns:repeat(3,minmax(0,1fr))}
  }

  @media (max-height:500px){
    :root{--world-topbar-height:48px}
    .page{padding-top:calc(var(--world-topbar-height) + 5px)!important}
    #panel{
      height:calc(100svh - var(--world-topbar-height) - 10px);
      max-height:calc(100svh - var(--world-topbar-height) - 10px);
    }
    .categorySection{padding:23px 8px 6px}
    .sectionHeading{top:7px;left:8px}
    .meta{margin-bottom:6px}
    .pill{padding:4px 6px;font-size:10px}
    .vitals{gap:5px}
    .row{grid-template-columns:34px minmax(0,1fr) 70px;gap:6px;font-size:11px}
    .atkBox{margin-top:6px;padding-top:5px}
    .atkMain strong{font-size:23px}
    .subsectionHeading,.bagHead{margin-bottom:4px}
    .equipped{grid-template-columns:28px minmax(0,1fr);gap:4px;min-height:38px}
    .equippedIcon{font-size:20px}
    .equippedBonus{grid-column:1/-1;text-align:center;font-size:10px}
    .weaponGrid{grid-template-columns:repeat(4,minmax(0,1fr));gap:4px}
    .slotIcon{font-size:18px}
    .bagNote{margin-top:4px;line-height:1.2}
  }
</style>
</head>

<body class="world-app" data-app="status">
<div class="page">
  <header>
    <h1>キャラステータス</h1>
    <button id="backBtn" type="button" aria-label="トップへ戻る">← 戻る</button>
  </header>

  <section id="panel" aria-label="キャラクター情報">
    <div class="statusLayout">
      <section class="categorySection characterSection" aria-labelledby="characterTitle">
        <h2 id="characterTitle" class="sectionHeading">CHARACTER</h2>
        <div class="avatarWrap">
          <div class="avatar">
            <img src="../img/rpg_player_character.png" alt="プレイヤーキャラクター">
          </div>
        </div>
      </section>

      <section class="categorySection statsSection" aria-labelledby="statsTitle">
        <h2 id="statsTitle" class="sectionHeading">STATUS</h2>
        <div class="meta">
          <div class="pill"><span>Lv</span><span id="lv">1</span></div>
          <div class="pill"><span>総EXP</span><span id="totalExp">0</span></div>
          <div class="pill"><span>次Lvまで</span><span id="toNext">20</span></div>
        </div>
        <div class="vitals">
          <div class="row">
            <span class="label">EXP</span>
            <div class="barWrap"><div id="expBar" class="barInner barExp"></div></div>
            <span id="expText" class="barText">0 / 20</span>
          </div>
          <div class="row">
            <span class="label">HP</span>
            <div class="barWrap"><div id="hpBar" class="barInner barHp"></div></div>
            <span id="hpText" class="barText">30 / 30</span>
          </div>
        </div>
        <div class="atkBox">
          <div class="atkMain"><span>ATK</span><strong id="atk">5</strong></div>
          <small id="atkDetail">基礎 5</small>
        </div>
      </section>

      <section class="categorySection equipmentPanel" aria-labelledby="gearTitle">
        <h2 id="gearTitle" class="sectionHeading">EQUIPMENT</h2>
        <h3 id="currentEquipmentTitle" class="subsectionHeading">EQUIPPED</h3>
        <div id="equippedWeapon" class="equipped emptyEquipment">
          <span class="equippedIcon">◌</span>
          <span><strong class="equippedName">装備なし</strong><small class="equippedRank">AUTO EQUIP</small></span>
          <strong class="equippedBonus">ATK +0%</strong>
        </div>
      </section>

      <section class="categorySection itemBag" aria-labelledby="itemBagSectionTitle">
        <h2 id="itemBagSectionTitle" class="sectionHeading">ITEM BAG</h2>
        <div class="bagHead">
          <h3 id="itemBagTitle" class="subsectionHeading">INVENTORY</h3>
          <span id="bagCount">所持 0</span>
        </div>
        <div id="weaponGrid" class="weaponGrid" aria-label="武器一覧"></div>
        <p class="bagNote">同じランクが3個そろうと自動強化</p>
      </section>
    </div>
  </section>
</div>

<script src="./lib/rpg_progression.js"></script>
<script src="./lib/rpg_equipment.js"></script>
<script>
  const $ = (id)=>document.getElementById(id);
  const clamp = (x,a,b)=>Math.max(a,Math.min(b,x));
  const setBar = (el,r)=>el && (el.style.width=(100*clamp(r,0,1)).toFixed(1)+'%');
  const progression = window.RPGProgression;

  let lv, exp, nextExp, maxHP, atk, totalExp;

  const load = ()=>{
    const snapshot = progression.getSnapshot();
    lv = snapshot.level;
    exp = snapshot.exp;
    nextExp = snapshot.nextExp;
    maxHP = snapshot.maxHP;
    atk = snapshot.baseAttack;
    totalExp = snapshot.totalExp;
  };

  const render = ()=>{
    const equipment = window.RPGEquipment;
    const attack = equipment
      ? equipment.getAttackStats(atk)
      : { base:atk, bonus:0, total:atk, equipped:null };

    $('lv').textContent = lv;
    $('atk').textContent = attack.total;
    $('atkDetail').textContent = attack.bonus > 0
      ? `基礎 ${attack.base} + 装備 ${attack.bonus}`
      : `基礎 ${attack.base}`;
    $('totalExp').textContent = totalExp;

    $('expText').textContent = `${exp} / ${nextExp}`;
    $('hpText').textContent = `${maxHP} / ${maxHP}`;
    $('toNext').textContent = Math.max(0, nextExp - exp);

    setBar($('expBar'), exp / nextExp);
    setBar($('hpBar'), 1);

    renderEquipment(equipment, attack.equipped);
  };

  const renderEquipment = (equipment, equipped)=>{
    const inventory = equipment ? equipment.getInventory() : [];
    const ownedWeapons = inventory.filter((weapon)=>weapon.count > 0);
    const total = ownedWeapons.reduce((sum, weapon)=>sum + weapon.count, 0);
    $('bagCount').textContent = `所持 ${total}`;

    const equippedEl = $('equippedWeapon');
    equippedEl.classList.toggle('emptyEquipment', !equipped);
    equippedEl.querySelector('.equippedIcon').textContent = equipped ? equipped.icon : '◌';
    equippedEl.querySelector('.equippedName').textContent = equipped ? equipped.name : '装備なし';
    equippedEl.querySelector('.equippedRank').textContent = equipped ? `RANK ${equipped.rank}・AUTO EQUIP` : 'AUTO EQUIP';
    equippedEl.querySelector('.equippedBonus').textContent = equipped ? `ATK +${equipped.atkBonusPct}%` : 'ATK +0%';

    const grid = $('weaponGrid');
    grid.replaceChildren();
    if(!ownedWeapons.length){
      const empty = document.createElement('p');
      empty.className = 'bagEmpty';
      empty.textContent = 'まだ武器を持っていません';
      grid.appendChild(empty);
      return;
    }
    ownedWeapons.forEach((weapon)=>{
      const slot = document.createElement('div');
      slot.className = 'weaponSlot';
      slot.title = `${weapon.name} / ATK +${weapon.atkBonusPct}%`;
      slot.innerHTML = `<span class="slotRank">R${weapon.rank}</span><span class="slotIcon">${weapon.icon}</span><span class="slotCount">${weapon.count}</span>`;
      grid.appendChild(slot);
    });
  };

  const init = ()=>{
    load(); render();
    $('backBtn').addEventListener('click', ()=>{
      location.href = '../index.html';
    });
  };
  window.addEventListener('storage', ()=>{ load(); render(); });
  window.addEventListener('rpg-exp-change', ()=>{ load(); render(); });
  window.addEventListener('rpg-equipment-change', render);
  init();
</script>
</body>
</html>
