<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>各科目 フラッシュカード</title>

  <style>
    :root{
      --bg:#0f172a; --panel:#0a0f1a; --card:#0b1220;
      --border:#1f2937; --fg:#e5e7eb; --muted:#9ca3af;
      --acc:#22d3ee; --answer:#7CFFB2;
    }
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,
        "Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
      line-height:1.7;
      background:
        url("../img/フィールド_草原_夜.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;
      color:var(--fg);
      text-shadow:0 2px 5px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.65);
    }
    .page{
      min-height:100vh;
      min-height:100dvh;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:80px 16px 24px;
      box-sizing:border-box;
    }
    .topbar{
      position:fixed;
      top:0; left:0; right:0;
      z-index:10;
      padding:8px 16px;
      display:flex;
      justify-content:center;
      background: linear-gradient(180deg, rgba(15,23,42,.58), rgba(15,23,42,.2) 60%, transparent);
      backdrop-filter: blur(6px);
    }
    .topbar-inner{
      width:min(960px,96vw);
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }
    .topbar-inner .spacer{flex:1;}
    .app-title{
      font-size: clamp(18px,3.6vw,22px);
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .back-link{
      display:inline-flex;
      align-items:center;
      gap:6px;
      text-decoration:none;
      color: var(--fg);
      border: 1px solid rgba(148,163,184,.28);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      background: rgba(10,19,34,.48);
    }
    .back-link:hover{ border-color:#2b3a55; }

    .flashcard{
      width: min(960px, 96vw);
      background: rgba(10,19,34,.38);
      border-radius: 0.9rem;
      padding: 1.2rem 1.4rem 1.8rem;
      border: 1px solid rgba(148,163,184,.28);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position:relative;
    }
    .flashcard:active{
      border-color:#334155;
      box-shadow:0 8px 22px rgba(0,0,0,.32), inset 0 0 0 1px rgba(148,163,184,.16);
    }
    .flashcard:focus{ outline:none; }
    .flashcard:focus-visible{
      outline:2px solid rgba(34,211,238,.45);
      outline-offset:3px;
    }

    .category-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
      flex-wrap:nowrap;
      min-width:0;
    }
    .category-label{
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      flex:0 0 auto;
      white-space:nowrap;
    }
    .category-name{
      font-size: clamp(16px,3.2vw,20px);
      font-weight: 800;
      letter-spacing: 0.01em;
      color: var(--fg);
      text-align: left;
      flex:1 1 auto;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .category-count{
      font-size:0.85rem;
      color:var(--muted);
      flex:0 0 auto;
      white-space:nowrap;
    }
    .progress{
      font-size:0.85rem;
      color:var(--muted);
      flex:0 0 auto;
      white-space:nowrap;
    }
    .category-spacer{ display:none; }
    button{
      background: rgba(10,19,34,.48);
      color: var(--fg);
      border: 1px solid rgba(148,163,184,.28);
      border-radius: 12px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      flex:0 0 auto;
      white-space:nowrap;
    }
    button:hover{ border-color:#2b3a55; }
    button:active{ border-color:#334155; box-shadow:inset 0 0 0 1px rgba(148,163,184,.14); }
    button:focus{ outline:none; }
    button:focus-visible{ outline:2px solid rgba(34,211,238,.45); outline-offset:2px; }

    .card-title { display:none; }

    .qa{
      min-height: 120px;
      white-space: normal;
      font-size: clamp(18px,3.6vw,24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .card-face{
      width:100%;
      display:inline-block;
      white-space:pre-line;
    }

    .card-answer{
      margin-top: 0.75rem;
      padding-top: 0.6rem;
      border-top: 1px dashed var(--border);
      color: var(--answer);
      transition: opacity 0.15s ease;
    }
    .card-answer.is-hidden{
      color: transparent;
      border-color: transparent;
    }

    /* RPG風 EXP獲得メッセージ */
    .exp-message{
      position:fixed;
      left:50%;
      bottom:max(22px, env(safe-area-inset-bottom));
      z-index:30;
      width:min(520px, calc(100vw - 28px));
      box-sizing:border-box;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:12px;
      padding:13px 18px;
      color:#f8fafc;
      background:linear-gradient(135deg, rgba(10,19,34,.96), rgba(20,32,54,.96));
      border:1px solid rgba(125,255,178,.72);
      border-radius:16px;
      box-shadow:
        0 0 0 3px rgba(10,19,34,.82),
        0 0 0 4px rgba(34,211,238,.34),
        0 16px 42px rgba(0,0,0,.58),
        0 0 28px rgba(34,211,238,.22),
        inset 0 0 22px rgba(125,255,178,.07);
      overflow:hidden;
      pointer-events:none;
      opacity:0;
      transform:translate(-50%, 24px) scale(.94);
      text-shadow:0 2px 5px rgba(0,0,0,.86);
    }
    .exp-message[hidden]{ display:none; }
    .exp-message::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(105deg, transparent 20%, rgba(255,255,255,.18) 45%, transparent 67%);
      transform:translateX(-115%);
    }
    .exp-message::after{
      content:"✦";
      position:absolute;
      right:8px;
      top:-8px;
      color:rgba(255,234,125,.55);
      font-size:30px;
      line-height:1;
      filter:drop-shadow(0 0 7px rgba(255,234,125,.7));
    }
    .exp-message.is-visible{ animation:expMessageIn .55s cubic-bezier(.2,.8,.2,1) both; }
    .exp-message.is-visible::before{ animation:expMessageShine 1.1s .12s ease-out both; }
    .exp-message-icon{
      position:relative;
      z-index:1;
      display:grid;
      place-items:center;
      width:46px;
      height:46px;
      border-radius:50%;
      font-size:27px;
      background:radial-gradient(circle at 35% 30%, #fff6a8 0 8%, #fbbf24 34%, #f97316 75%);
      box-shadow:0 0 18px rgba(251,191,36,.55), inset 0 0 0 2px rgba(255,255,255,.4);
    }
    .is-visible .exp-message-icon{ animation:expIconBounce .72s .08s cubic-bezier(.2,.9,.3,1.25) both; }
    .exp-message-copy{ position:relative; z-index:1; min-width:0; }
    .exp-message-title{
      color:#d1fae5;
      font-size:clamp(.82rem, 2.8vw, .95rem);
      font-weight:800;
      letter-spacing:.04em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .exp-message-total{ margin-top:1px; color:#a5b4c7; font-size:.76rem; font-weight:700; }
    .exp-message-gain{
      position:relative;
      z-index:1;
      color:#fff3a3;
      font-size:clamp(1.1rem, 4vw, 1.35rem);
      font-weight:900;
      letter-spacing:.02em;
      white-space:nowrap;
      text-shadow:0 0 12px rgba(251,191,36,.72), 0 2px 4px rgba(0,0,0,.9);
    }
    .is-visible .exp-message-gain{ animation:expGainPop .6s .18s cubic-bezier(.2,.9,.3,1.35) both; }
    .exp-particle{
      position:absolute;
      z-index:2;
      color:#fef08a;
      font-size:14px;
      opacity:0;
      filter:drop-shadow(0 0 5px #fbbf24);
    }
    .exp-particle.p1{ left:14%; top:5px; }
    .exp-particle.p2{ left:48%; bottom:3px; font-size:10px; }
    .exp-particle.p3{ right:19%; top:4px; font-size:11px; }
    .is-visible .exp-particle{ animation:expParticle 1.15s .22s ease-out both; }
    .is-visible .exp-particle.p2{ animation-delay:.34s; }
    .is-visible .exp-particle.p3{ animation-delay:.46s; }

    @keyframes expMessageIn{
      0%{ opacity:0; transform:translate(-50%, 24px) scale(.94); }
      100%{ opacity:1; transform:translate(-50%, 0) scale(1); }
    }
    @keyframes expMessageShine{ from{ transform:translateX(-115%); } to{ transform:translateX(115%); } }
    @keyframes expIconBounce{
      0%{ transform:scale(.45) rotate(-18deg); }
      58%{ transform:scale(1.16) rotate(7deg); }
      100%{ transform:scale(1) rotate(0); }
    }
    @keyframes expGainPop{
      0%{ opacity:0; transform:scale(.4) translateY(8px); }
      65%{ opacity:1; transform:scale(1.18) translateY(-2px); }
      100%{ opacity:1; transform:scale(1) translateY(0); }
    }
    @keyframes expParticle{
      0%{ opacity:0; transform:translateY(8px) scale(.4) rotate(0); }
      30%{ opacity:1; }
      100%{ opacity:0; transform:translateY(-18px) scale(1.3) rotate(55deg); }
    }

    @media (max-width: 420px) {
      .exp-message{ gap:9px; padding:11px 13px; }
      .exp-message-icon{ width:40px; height:40px; font-size:23px; }
      .exp-message-total{ font-size:.7rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .exp-message.is-visible{ animation:expMessageFade .25s ease both; }
      .exp-message.is-visible::before,
      .is-visible .exp-message-icon,
      .is-visible .exp-message-gain,
      .is-visible .exp-particle{ animation:none; }
      @keyframes expMessageFade{
        from{ opacity:0; transform:translate(-50%, 0); }
        to{ opacity:1; transform:translate(-50%, 0); }
      }
    }

    @media (min-width: 768px) {
      .page { padding: 96px 16px 32px; }
      .category-row{ gap:10px; }
      .category-spacer{
        display:block;
        flex:1 1 auto;
        min-width:16px;
      }
      .category-name{ flex:0 1 auto; }
    }

    @media (max-width: 420px) {
      .flashcard{ padding: 1rem 0.9rem 1.7rem; }
      .category-row{ gap:6px; }
      .category-label{ font-size:0.68rem; letter-spacing:0.04em; }
      .category-name{ font-size:15px; }
      .category-count,
      .progress{ font-size:0.78rem; }
      button{ padding:7px 9px; border-radius:10px; }
    }
  </style>

  <!-- MathJax 設定 -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [["$", "$"], ["\\(", "\\)"]] },
      svg: { fontCache: "global" }
    };
  </script>
  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script src="../qa_tex/files.js"></script>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="app-title">各科目 フラッシュカード</div>
      <div class="spacer"></div>
      <a class="back-link" href="../index.html" aria-label="戻る">← 戻る</a>
    </div>
  </div>

  <div class="page">
    <section class="flashcard" id="flashcard">
      <div class="category-row" aria-label="カテゴリ">
        <div class="category-label">カテゴリ</div>
        <div id="categoryLabel" class="category-name">--</div>
        <div id="totalCount" class="category-count">全0問</div>
        <div class="category-spacer"></div>
        <button id="randomBtn" type="button">切り替え</button>
        <div id="countLabel" class="progress">0 / 3</div>
      </div>

      <div class="card-title" id="problemTitle">第1問</div>

      <div class="qa">
        <div class="card-face" id="problemQuestion"></div>
        <div class="card-face card-answer is-hidden" id="problemAnswer"></div>
      </div>

    </section>
  </div>

  <div id="expMessage" class="exp-message" role="status" aria-live="polite" aria-atomic="true" hidden>
    <span class="exp-particle p1" aria-hidden="true">✦</span>
    <span class="exp-particle p2" aria-hidden="true">◆</span>
    <span class="exp-particle p3" aria-hidden="true">✧</span>
    <div class="exp-message-icon" aria-hidden="true">📖</div>
    <div class="exp-message-copy">
      <div id="expMessageTitle" class="exp-message-title">知識がひとつ身についた！</div>
      <div class="exp-message-total">累計 EXP <span id="expMessageTotal">0</span></div>
    </div>
    <div class="exp-message-gain">+1 EXP</div>
  </div>

  <script>
    // ---------- EXP ----------
    const EXP_KEY = "midunohi.exam.exp";
    let exp = 0;

    const expMessageEl = document.getElementById("expMessage");
    const expMessageTitleEl = document.getElementById("expMessageTitle");
    const expMessageTotalEl = document.getElementById("expMessageTotal");
    const countLabelEl = document.getElementById("countLabel");
    const totalCountEl = document.getElementById("totalCount");

    function loadExp() {
      try {
        const stored = localStorage.getItem(EXP_KEY);
        if (stored == null) exp = 0;
        else {
          const n = Number(stored);
          exp = Number.isFinite(n) && n >= 0 ? Math.floor(n) : 0;
        }
      } catch (e) {
        console.warn("EXP を読み込めませんでした", e);
        exp = 0;
      }
    }

    function saveExp() {
      try {
        localStorage.setItem(EXP_KEY, String(exp));
      } catch (e) {
        console.warn("EXP を保存できませんでした", e);
      }
    }

    function showExpMessage() {
      if (!expMessageEl) return;
      const messages = [
        "知識がひとつ身についた！",
        "学びの歩みが輝いた！",
        "理解のかけらを手に入れた！",
        "冒険の知恵が深まった！"
      ];
      if (expMessageTitleEl) expMessageTitleEl.textContent = messages[(exp - 1) % messages.length];
      if (expMessageTotalEl) expMessageTotalEl.textContent = String(exp);

      expMessageEl.hidden = false;
      expMessageEl.classList.remove("is-visible");
      void expMessageEl.offsetWidth; // 連続獲得時もアニメーションを先頭から再生
      expMessageEl.classList.add("is-visible");
    }

    function hideExpMessage() {
      if (!expMessageEl) return;
      expMessageEl.classList.remove("is-visible");
      expMessageEl.hidden = true;
    }

    // ---------- Problems ----------
    const fallbackProblems = [
      ["\\(x^2\\) の微分は？", "\\(2x\\)"],
      ["\\(\\int_0^1 x\\,dx\\) は？", "\\(\\frac{1}{2}\\)"],
      ["\\(\\sin^2 x + \\cos^2 x\\) は？", "\\(1\\)"]
    ];
    let problems = [];
    let currentCategory = "--";
    let currentFileIndex = -1;
    let categoryPool = [];
    let remainingProblemIndices = [];
    const QUESTIONS_PER_CATEGORY = 3;

    const problemQuestionEl = document.getElementById("problemQuestion");
    const problemAnswerEl = document.getElementById("problemAnswer");
    const flashcardEl = document.getElementById("flashcard");
    const randomBtnEl = document.getElementById("randomBtn");
    const categoryLabelEl = document.getElementById("categoryLabel");

    let currentIndex = 0;
    let showingAnswer = false;
    let cycleCount = 0;
    let busy = false;
    let filesCache = null;

    function pickRandomIndex(len, except) {
      if (len <= 1) return 0;
      let i = 0;
      do { i = Math.floor(Math.random() * len); } while (i === except);
      return i;
    }

    function normalizeFileEntries(files) {
      return files.map((entry) => {
        if (Array.isArray(entry)) {
          const name = String(entry[0] ?? "").trim();
          const weight = Number(entry[1]);
          return {
            name,
            weight: Number.isFinite(weight) && weight > 0 ? weight : 0,
          };
        }
        return { name: String(entry ?? "").trim(), weight: 1 };
      }).filter(file => file.name && file.weight > 0);
    }

    function pickWeightedFileIndex(files, except) {
      if (!categoryPool.length) categoryPool = files.map((_file, index) => index);
      let pool = categoryPool.map(index => ({ file: files[index], index }));
      if (pool.length > 1) {
        const withoutCurrent = pool.filter(({ index }) => index !== except);
        if (withoutCurrent.length) pool = withoutCurrent;
      }
      const total = pool.reduce((sum, item) => sum + item.file.weight, 0);
      if (total <= 0) {
        const fallbackIndex = pool[Math.floor(Math.random() * pool.length)].index;
        categoryPool = categoryPool.filter(index => index !== fallbackIndex);
        return fallbackIndex;
      }
      let r = Math.random() * total;
      for (const item of pool) {
        r -= item.file.weight;
        if (r < 0) {
          categoryPool = categoryPool.filter(index => index !== item.index);
          return item.index;
        }
      }
      const fallbackIndex = pool[pool.length - 1].index;
      categoryPool = categoryPool.filter(index => index !== fallbackIndex);
      return fallbackIndex;
    }

    function resetProblemQueue() {
      remainingProblemIndices = problems.map((_problem, index) => index);
    }

    function hasReachedCategoryLimit() {
      return cycleCount >= QUESTIONS_PER_CATEGORY || !remainingProblemIndices.length;
    }

    function takeRandomProblemIndex() {
      if (!remainingProblemIndices.length) return -1;
      const queueIndex = Math.floor(Math.random() * remainingProblemIndices.length);
      const [problemIndex] = remainingProblemIndices.splice(queueIndex, 1);
      return problemIndex;
    }

    // ---------- MathJax helpers ----------
    function delay(ms){ return new Promise(r => setTimeout(r, ms)); }

    async function waitForMathJax(maxMs = 5000) {
      const t0 = performance.now();
      while (performance.now() - t0 < maxMs) {
        const mj = window.MathJax;
        if (mj && mj.typesetPromise && mj.startup && mj.startup.promise) {
          await mj.startup.promise; // 完全起動待ち
          return mj;
        }
        await delay(25);
      }
      return null; // MathJax来ない場合も落ちないようにする
    }

    async function typesetElements(els) {
      const mj = await waitForMathJax();
      if (!mj) return; // MathJax未到着なら素表示で進む
      if (mj.typesetClear) mj.typesetClear(els);
      await mj.typesetPromise(els);
    }

    // ---------- Render ----------
    async function renderProblem() {
      const row = problems[currentIndex] || [];
      const question = row[0] ?? "";
      const answer = row[1] ?? "";

      // TeXの < や > をHTMLタグとして解釈させず、MathJaxにはテキストとして渡す。
      problemQuestionEl.textContent = String(question);
      problemAnswerEl.textContent = String(answer);

      problemAnswerEl.classList.add("is-hidden");
      showingAnswer = false;

      if (totalCountEl) totalCountEl.textContent = `全${problems.length}問`;
      if (countLabelEl) countLabelEl.textContent = `${Math.min(cycleCount, QUESTIONS_PER_CATEGORY)} / ${QUESTIONS_PER_CATEGORY}`;

      // その後にMathJaxで整える（準備できた時点で反映）
      await typesetElements([problemQuestionEl, problemAnswerEl]);
    }

    function safeGlobalEval(name) {
      try {
        return (0, eval)(name);
      } catch (_e) {
        return undefined;
      }
    }

    function injectScript(src) {
      return new Promise((resolve, reject) => {
        window.__examLoadedScripts = window.__examLoadedScripts || {};
        if (window.__examLoadedScripts[src]) {
          resolve(true);
          return;
        }
        const s = document.createElement("script");
        s.src = src;
        s.async = true;
        s.onload = () => {
          window.__examLoadedScripts[src] = true;
          resolve(true);
        };
        s.onerror = () => reject(new Error(`load failed: ${src}`));
        document.head.appendChild(s);
      });
    }

    async function useFallback(reason) {
      console.warn(reason);
      problems = fallbackProblems;
      currentCategory = "stub";
      cycleCount = 0;
      resetProblemQueue();
      updateRandomButton();
      await showRandomProblem(-1);
    }

    async function loadFilesList() {
      if (filesCache) return filesCache;
      const files = (typeof files_qaMath !== "undefined" && Array.isArray(files_qaMath)) ? files_qaMath : [];
      filesCache = normalizeFileEntries(files);
      return filesCache;
    }

    async function loadCategory(name) {
      const base = String(name || "").replace(/\.js$/i, "");
      const variableBase = base.split(/[\\/]/).pop();
      const jsSrc = encodeURI(`../qa_tex/${base}.js`);

      await injectScript(jsSrc);
      const raw = safeGlobalEval(`qa_${variableBase}`);
      const data = Array.isArray(raw) ? raw : [];

      if (!data.length) throw new Error(`qa_tex/${base}.js にカードがありません`);
      problems = data;
      currentCategory = base;
      cycleCount = 0;
      resetProblemQueue();
      updateRandomButton();
      await showRandomProblem(-1);
    }

    async function loadRandomCategory(exceptIndex = -1) {
      const files = await loadFilesList();
      if (!files.length) {
        await useFallback("qa_tex/files.js にカテゴリがありません");
        return -1;
      }
      const idx = pickWeightedFileIndex(files, exceptIndex);
      try {
        await loadCategory(files[idx].name);
        currentFileIndex = idx;
        return idx;
      } catch (e) {
        await useFallback(e);
        return -1;
      }
    }

    function updateRandomButton() {
      if (randomBtnEl) randomBtnEl.textContent = "切り替え";
      if (categoryLabelEl) categoryLabelEl.textContent = currentCategory;
    }

    async function showRandomProblem(_exceptIndex = -1) {
      if (!problems.length) {
        await useFallback("カードが読み込まれていないためスタブを表示します");
        return;
      }
      const nextIndex = takeRandomProblemIndex();
      if (nextIndex < 0) {
        await loadRandomCategory(currentFileIndex);
        return;
      }
      currentIndex = nextIndex;
      cycleCount += 1;
      await renderProblem();
    }

    // ---------- Click behavior ----------
    flashcardEl.addEventListener("click", async () => {
      if (busy) return;
      busy = true;
      try {
        if (!showingAnswer) {
          problemAnswerEl.classList.remove("is-hidden");
          showingAnswer = true;
          exp += 1;
          saveExp();
          showExpMessage();
          await typesetElements([problemAnswerEl]);
        } else {
          hideExpMessage();

          if (hasReachedCategoryLimit()) {
            try {
              currentFileIndex = await loadRandomCategory(currentFileIndex);
            } catch (err) {
              console.error(err);
            }
          } else {
            await showRandomProblem(currentIndex);
          }
        }
      } finally {
        busy = false;
      }
    });

    // ---------- Boot ----------
    (async () => {
      loadExp();
      try {
        updateRandomButton();
        await loadRandomCategory(-1);
      } catch (e) {
        await useFallback(e);
      }
    })();

    if (randomBtnEl) {
      randomBtnEl.addEventListener("click", async (e) => {
        e.stopPropagation();
        try {
          currentFileIndex = await loadRandomCategory(currentFileIndex);
        } catch (err) {
          console.error(err);
        }
      });
    }
  </script>
</body>
</html>
