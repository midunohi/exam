<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>各科目 フラッシュカード</title>

  <style>
    :root{
      --bg:#0f172a; --panel:#0a0f1a; --card:#0b1220;
      --border:#1f2937; --fg:#e5e7eb; --muted:#9ca3af;
      --acc:#22d3ee; --answer:#7CFFB2;
    }
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,
        "Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
      line-height:1.7;
      background:
        url("../img/フィールド_草原_夜.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;
      color:var(--fg);
      text-shadow:0 2px 5px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.65);
    }
    .page{
      min-height:100vh;
      min-height:100dvh;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:80px 16px 24px;
      box-sizing:border-box;
    }
    .topbar{
      position:fixed;
      top:0; left:0; right:0;
      z-index:10;
      padding:8px 16px;
      display:flex;
      justify-content:center;
      background: linear-gradient(180deg, rgba(15,23,42,.58), rgba(15,23,42,.2) 60%, transparent);
      backdrop-filter: blur(6px);
    }
    .topbar-inner{
      width:min(960px,96vw);
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }
    .topbar-inner .spacer{flex:1;}
    .app-title{
      font-size: clamp(18px,3.6vw,22px);
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .back-link{
      display:inline-flex;
      align-items:center;
      gap:6px;
      text-decoration:none;
      color: var(--fg);
      border: 1px solid rgba(148,163,184,.28);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      background: rgba(10,19,34,.48);
    }
    .back-link:hover{ border-color:#2b3a55; }

    .flashcard{
      width: min(960px, 96vw);
      background: rgba(10,19,34,.38);
      border-radius: 0.9rem;
      padding: 1.2rem 1.4rem 1.8rem;
      border: 1px solid rgba(148,163,184,.28);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position:relative;
    }
    .flashcard:active{
      border-color:#334155;
      box-shadow:0 8px 22px rgba(0,0,0,.32), inset 0 0 0 1px rgba(148,163,184,.16);
    }
    .flashcard:focus{ outline:none; }
    .flashcard:focus-visible{
      outline:2px solid rgba(34,211,238,.45);
      outline-offset:3px;
    }

    .category-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
      flex-wrap:nowrap;
      min-width:0;
    }
    .category-label{
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      flex:0 0 auto;
      white-space:nowrap;
    }
    .category-name{
      font-size: clamp(16px,3.2vw,20px);
      font-weight: 800;
      letter-spacing: 0.01em;
      color: var(--fg);
      text-align: left;
      flex:1 1 auto;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .category-count{
      font-size:0.85rem;
      color:var(--muted);
      flex:0 0 auto;
      white-space:nowrap;
    }
    .progress{
      font-size:0.85rem;
      color:var(--muted);
      flex:0 0 auto;
      white-space:nowrap;
    }
    .category-spacer{ display:none; }
    button{
      background: rgba(10,19,34,.48);
      color: var(--fg);
      border: 1px solid rgba(148,163,184,.28);
      border-radius: 12px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      flex:0 0 auto;
      white-space:nowrap;
    }
    button:hover{ border-color:#2b3a55; }
    button:active{ border-color:#334155; box-shadow:inset 0 0 0 1px rgba(148,163,184,.14); }
    button:focus{ outline:none; }
    button:focus-visible{ outline:2px solid rgba(34,211,238,.45); outline-offset:2px; }

    .card-title { display:none; }

    .qa{
      min-height: 120px;
      white-space: normal;
      font-size: clamp(18px,3.6vw,24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .card-face{ width:100%; display:inline-block; }

    .card-answer{
      margin-top: 0.75rem;
      padding-top: 0.6rem;
      border-top: 1px dashed var(--border);
      color: var(--answer);
      transition: opacity 0.15s ease;
    }
    .card-answer.is-hidden{
      color: transparent;
      border-color: transparent;
    }

    .exp-corner{
      position:absolute;
      right:18px;
      bottom:16px;
      font-size:0.85rem;
      color:var(--muted);
    }

    @media (min-width: 768px) {
      .page { padding: 96px 16px 32px; }
      .category-row{ gap:10px; }
      .category-spacer{
        display:block;
        flex:1 1 auto;
        min-width:16px;
      }
      .category-name{ flex:0 1 auto; }
    }

    @media (max-width: 420px) {
      .flashcard{ padding: 1rem 0.9rem 1.7rem; }
      .category-row{ gap:6px; }
      .category-label{ font-size:0.68rem; letter-spacing:0.04em; }
      .category-name{ font-size:15px; }
      .category-count,
      .progress{ font-size:0.78rem; }
      button{ padding:7px 9px; border-radius:10px; }
    }
  </style>

  <!-- MathJax 設定 -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [["$", "$"], ["\\(", "\\)"]] },
      svg: { fontCache: "global" }
    };
  </script>
  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script src="../qa_tex/files.js"></script>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="app-title">各科目 フラッシュカード</div>
      <div class="spacer"></div>
      <a class="back-link" href="../index.html" aria-label="戻る">← 戻る</a>
    </div>
  </div>

  <div class="page">
    <section class="flashcard" id="flashcard">
      <div class="category-row" aria-label="カテゴリ">
        <div class="category-label">カテゴリ</div>
        <div id="categoryLabel" class="category-name">--</div>
        <div id="totalCount" class="category-count">全0問</div>
        <div class="category-spacer"></div>
        <button id="randomBtn" type="button">切り替え</button>
        <div id="countLabel" class="progress">0 / 3</div>
      </div>

      <div class="card-title" id="problemTitle">第1問</div>

      <div class="qa">
        <div class="card-face" id="problemQuestion"></div>
        <div class="card-face card-answer is-hidden" id="problemAnswer"></div>
      </div>

      <div class="exp-corner">EXP: <span id="expLabel">0</span></div>
    </section>
  </div>

  <script>
    // ---------- EXP ----------
    const EXP_KEY = "midunohi.exam.exp";
    let exp = 0;

    const expDisplayEl = document.getElementById("expLabel");
    const countLabelEl = document.getElementById("countLabel");
    const totalCountEl = document.getElementById("totalCount");

    function loadExp() {
      try {
        const stored = localStorage.getItem(EXP_KEY);
        if (stored == null) exp = 0;
        else {
          const n = Number(stored);
          exp = Number.isFinite(n) && n >= 0 ? Math.floor(n) : 0;
        }
      } catch (e) {
        console.warn("EXP を読み込めませんでした", e);
        exp = 0;
      }
      updateExpDisplay();
    }

    function saveExp() {
      try {
        localStorage.setItem(EXP_KEY, String(exp));
      } catch (e) {
        console.warn("EXP を保存できませんでした", e);
      }
      updateExpDisplay();
    }

    function updateExpDisplay() {
      if (expDisplayEl) expDisplayEl.textContent = String(exp);
    }

    // ---------- Problems ----------
    const fallbackProblems = [
      ["\\(x^2\\) の微分は？", "\\(2x\\)"],
      ["\\(\\int_0^1 x\\,dx\\) は？", "\\(\\frac{1}{2}\\)"],
      ["\\(\\sin^2 x + \\cos^2 x\\) は？", "\\(1\\)"]
    ];
    let problems = [];
    let currentCategory = "--";
    let currentFileIndex = -1;
    let categoryPool = [];
    let remainingProblemIndices = [];
    const QUESTIONS_PER_CATEGORY = 3;

    const problemQuestionEl = document.getElementById("problemQuestion");
    const problemAnswerEl = document.getElementById("problemAnswer");
    const flashcardEl = document.getElementById("flashcard");
    const randomBtnEl = document.getElementById("randomBtn");
    const categoryLabelEl = document.getElementById("categoryLabel");

    let currentIndex = 0;
    let showingAnswer = false;
    let cycleCount = 0;
    let busy = false;
    let filesCache = null;

    function pickRandomIndex(len, except) {
      if (len <= 1) return 0;
      let i = 0;
      do { i = Math.floor(Math.random() * len); } while (i === except);
      return i;
    }

    function normalizeFileEntries(files) {
      return files.map((entry) => {
        if (Array.isArray(entry)) {
          const name = String(entry[0] ?? "").trim();
          const weight = Number(entry[1]);
          return {
            name,
            weight: Number.isFinite(weight) && weight > 0 ? weight : 0,
          };
        }
        return { name: String(entry ?? "").trim(), weight: 1 };
      }).filter(file => file.name && file.weight > 0);
    }

    function pickWeightedFileIndex(files, except) {
      if (!categoryPool.length) categoryPool = files.map((_file, index) => index);
      let pool = categoryPool.map(index => ({ file: files[index], index }));
      if (pool.length > 1) {
        const withoutCurrent = pool.filter(({ index }) => index !== except);
        if (withoutCurrent.length) pool = withoutCurrent;
      }
      const total = pool.reduce((sum, item) => sum + item.file.weight, 0);
      if (total <= 0) {
        const fallbackIndex = pool[Math.floor(Math.random() * pool.length)].index;
        categoryPool = categoryPool.filter(index => index !== fallbackIndex);
        return fallbackIndex;
      }
      let r = Math.random() * total;
      for (const item of pool) {
        r -= item.file.weight;
        if (r < 0) {
          categoryPool = categoryPool.filter(index => index !== item.index);
          return item.index;
        }
      }
      const fallbackIndex = pool[pool.length - 1].index;
      categoryPool = categoryPool.filter(index => index !== fallbackIndex);
      return fallbackIndex;
    }

    function resetProblemQueue() {
      remainingProblemIndices = problems.map((_problem, index) => index);
    }

    function hasReachedCategoryLimit() {
      return cycleCount >= QUESTIONS_PER_CATEGORY || !remainingProblemIndices.length;
    }

    function takeRandomProblemIndex() {
      if (!remainingProblemIndices.length) return -1;
      const queueIndex = Math.floor(Math.random() * remainingProblemIndices.length);
      const [problemIndex] = remainingProblemIndices.splice(queueIndex, 1);
      return problemIndex;
    }

    // ---------- MathJax helpers ----------
    function delay(ms){ return new Promise(r => setTimeout(r, ms)); }

    async function waitForMathJax(maxMs = 5000) {
      const t0 = performance.now();
      while (performance.now() - t0 < maxMs) {
        const mj = window.MathJax;
        if (mj && mj.typesetPromise && mj.startup && mj.startup.promise) {
          await mj.startup.promise; // 完全起動待ち
          return mj;
        }
        await delay(25);
      }
      return null; // MathJax来ない場合も落ちないようにする
    }

    async function typesetElements(els) {
      const mj = await waitForMathJax();
      if (!mj) return; // MathJax未到着なら素表示で進む
      if (mj.typesetClear) mj.typesetClear(els);
      await mj.typesetPromise(els);
    }

    // ---------- Render ----------
    async function renderProblem() {
      const row = problems[currentIndex] || [];
      const question = row[0] ?? "";
      const answer = row[1] ?? "";

      // まず普通に表示（MathJax待ちの間も文字が出る）
      problemQuestionEl.innerHTML = String(question);
      problemAnswerEl.innerHTML = String(answer);

      problemAnswerEl.classList.add("is-hidden");
      showingAnswer = false;

      if (totalCountEl) totalCountEl.textContent = `全${problems.length}問`;
      if (countLabelEl) countLabelEl.textContent = `${Math.min(cycleCount, QUESTIONS_PER_CATEGORY)} / ${QUESTIONS_PER_CATEGORY}`;

      // その後にMathJaxで整える（準備できた時点で反映）
      await typesetElements([problemQuestionEl, problemAnswerEl]);
    }

    function safeGlobalEval(name) {
      try {
        return (0, eval)(name);
      } catch (_e) {
        return undefined;
      }
    }

    function injectScript(src) {
      return new Promise((resolve, reject) => {
        window.__examLoadedScripts = window.__examLoadedScripts || {};
        if (window.__examLoadedScripts[src]) {
          resolve(true);
          return;
        }
        const s = document.createElement("script");
        s.src = src;
        s.async = true;
        s.onload = () => {
          window.__examLoadedScripts[src] = true;
          resolve(true);
        };
        s.onerror = () => reject(new Error(`load failed: ${src}`));
        document.head.appendChild(s);
      });
    }

    async function useFallback(reason) {
      console.warn(reason);
      problems = fallbackProblems;
      currentCategory = "stub";
      cycleCount = 0;
      resetProblemQueue();
      updateRandomButton();
      await showRandomProblem(-1);
    }

    async function loadFilesList() {
      if (filesCache) return filesCache;
      const files = (typeof files_qaMath !== "undefined" && Array.isArray(files_qaMath)) ? files_qaMath : [];
      filesCache = normalizeFileEntries(files);
      return filesCache;
    }

    async function loadCategory(name) {
      const base = String(name || "").replace(/\.js$/i, "");
      const variableBase = base.split(/[\\/]/).pop();
      const jsSrc = encodeURI(`../qa_tex/${base}.js`);

      await injectScript(jsSrc);
      const raw = safeGlobalEval(`qa_${variableBase}`);
      const data = Array.isArray(raw) ? raw : [];

      if (!data.length) throw new Error(`qa_tex/${base}.js にカードがありません`);
      problems = data;
      currentCategory = base;
      cycleCount = 0;
      resetProblemQueue();
      updateRandomButton();
      await showRandomProblem(-1);
    }

    async function loadRandomCategory(exceptIndex = -1) {
      const files = await loadFilesList();
      if (!files.length) {
        await useFallback("qa_tex/files.js にカテゴリがありません");
        return -1;
      }
      const idx = pickWeightedFileIndex(files, exceptIndex);
      try {
        await loadCategory(files[idx].name);
        currentFileIndex = idx;
        return idx;
      } catch (e) {
        await useFallback(e);
        return -1;
      }
    }

    function updateRandomButton() {
      if (randomBtnEl) randomBtnEl.textContent = "切り替え";
      if (categoryLabelEl) categoryLabelEl.textContent = currentCategory;
    }

    async function showRandomProblem(_exceptIndex = -1) {
      if (!problems.length) {
        await useFallback("カードが読み込まれていないためスタブを表示します");
        return;
      }
      const nextIndex = takeRandomProblemIndex();
      if (nextIndex < 0) {
        await loadRandomCategory(currentFileIndex);
        return;
      }
      currentIndex = nextIndex;
      cycleCount += 1;
      await renderProblem();
    }

    // ---------- Click behavior ----------
    flashcardEl.addEventListener("click", async () => {
      if (busy) return;
      busy = true;
      try {
        if (!showingAnswer) {
          problemAnswerEl.classList.remove("is-hidden");
          showingAnswer = true;
          await typesetElements([problemAnswerEl]);
        } else {
          exp += 1;
          saveExp();

          if (hasReachedCategoryLimit()) {
            try {
              currentFileIndex = await loadRandomCategory(currentFileIndex);
            } catch (err) {
              console.error(err);
            }
          } else {
            await showRandomProblem(currentIndex);
          }
        }
      } finally {
        busy = false;
      }
    });

    // ---------- Boot ----------
    (async () => {
      loadExp();
      try {
        updateRandomButton();
        await loadRandomCategory(-1);
      } catch (e) {
        await useFallback(e);
      }
    })();

    if (randomBtnEl) {
      randomBtnEl.addEventListener("click", async (e) => {
        e.stopPropagation();
        try {
          currentFileIndex = await loadRandomCategory(currentFileIndex);
        } catch (err) {
          console.error(err);
        }
      });
    }
  </script>
</body>
</html>
