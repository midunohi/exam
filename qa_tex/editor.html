<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>QA TeX Editor</title>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        packages: {'[+]': ['ams']}
      },
      loader: { load: ['[tex]/ams'] },
      startup: { typeset: false },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-chtml.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --app-bg: #14171b;
      --rail-bg: #1d2127;
      --field-bg: #0d1117;
      --preview-bg: #171b20;
      --border: #3a414b;
      --soft-border: rgb(174 182 194 / 24%);
      --set-gap: #292f37;
      --inner-divider: #697381;
      --text: #f2f4f7;
      --muted: #aeb6c2;
      --accent: #7fc6ff;
      --danger: #ff8b8b;
      --rail-width: 176px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      background: var(--app-bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP",
                   "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", sans-serif;
    }
    button, textarea, input, label.fileAction { font: inherit; }
    button, label.fileAction {
      display: flex;
      width: 100%;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #2b313a;
      color: var(--text);
      padding: 8px 9px;
      cursor: pointer;
      user-select: none;
    }
    button:hover, label.fileAction:hover { background: #353c47; }
    button.primary { border-color: #2a82c4; background: #1269a8; }
    button.primary:hover { background: #1778bc; }
    button.ok { border-color: #3f8f55; color: #c9ffd7; }
    button.danger { color: #ffd3d3; }
    .fileAction {
      display: flex;
      width: 100%;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      border-width: 1px;
      border-style: solid;
      border-radius: 7px;
      padding: 8px 10px;
      color: #fff;
      font: 600 14px/1 system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
      box-shadow: inset 0 1px rgb(255 255 255 / 9%);
    }
    .fileAction.openAction { border-color: #2a82c4; background: #1269a8; }
    .fileAction.openAction:hover { background: #1778bc; }
    .fileAction.saveAction { border-color: #3f8f55; background: #23683b; color: #e9ffef; }
    .fileAction.saveAction:hover { background: #2b7a47; }
    input[type="file"] { display: none; }
    main { display: grid; grid-template-columns: var(--rail-width) minmax(0, 1fr); height: 100vh; min-height: 0; }
    aside {
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      overflow: auto;
      background: var(--rail-bg);
      border-right: 1px solid var(--border);
    }
    .fileInfo { display: flex; flex-direction: column; gap: 4px; min-width: 0; padding: 3px 1px 5px; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .fileName { overflow: hidden; color: var(--text); text-overflow: ellipsis; white-space: nowrap; }
    .status.error { color: var(--danger); }
    .railSpacer { flex: 1 1 auto; min-height: 8px; }
    .qaList { display: grid; gap: 8px; min-width: 0; min-height: 0; padding-bottom: 8px; overflow: auto; align-content: start; background: var(--set-gap); }
    .qaItem { display: grid; grid-template-columns: 42px minmax(260px, 1fr) minmax(260px, 1fr); min-width: 0; border: 0; background: var(--app-bg); }
    .qaActions { display: flex; flex-direction: column; justify-content: flex-start; align-items: center; gap: 0; padding: 7px 5px; border-right: 1px solid var(--border); background: var(--rail-bg); }
    .qaActions button { width: 28px; min-height: 22px; height: 22px; padding: 0; border: 1px solid rgb(255 255 255 / 16%); border-radius: 0; background: rgb(255 255 255 / 4%); font-size: 13px; line-height: 1; }
    .qaActions button + button { border-top: 0; }
    .qaActions button:first-child { border-radius: 6px 6px 0 0; }
    .qaActions button:last-child { border-radius: 0 0 6px 6px; }
    .qaActions button:disabled { opacity: .3; cursor: default; }
    .qaPair { display: grid; grid-template-rows: minmax(92px, 1fr) minmax(92px, 1fr); min-width: 0; }
    .sourcePair { border-right: 1px solid var(--border); }
    textarea, .previewBox { display: block; width: 100%; min-width: 0; min-height: 92px; margin: 0; border: 0; border-radius: 0; color: var(--text); }
    textarea {
      resize: vertical;
      padding: 12px 14px;
      background: var(--field-bg);
      outline: none;
      font: 15px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, "Noto Sans Mono", monospace;
      white-space: pre-wrap;
    }
    textarea:focus { position: relative; z-index: 1; box-shadow: inset 0 0 0 2px var(--accent); }
    textarea::placeholder { color: #707987; }
    .previewBox { overflow: auto; padding: 12px 14px; background: var(--preview-bg); font-size: 16px; line-height: 1.5; white-space: pre-wrap; }
    .qaPair > :first-child { border-bottom: 1px dashed var(--inner-divider); }
    .previewBox mjx-container { margin: 0 !important; }
    .empty { display: grid; min-height: 100%; place-items: center; color: var(--muted); font-size: 13px; }
    @media (max-width: 820px) {
      :root { --rail-width: 150px; }
      .qaItem { grid-template-columns: 38px minmax(220px, 1fr) minmax(220px, 1fr); }
    }
    @media (max-width: 620px) {
      html, body { height: auto; min-height: 100%; overflow: auto; }
      main { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      aside { position: sticky; top: 0; z-index: 5; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); border-right: 0; border-bottom: 1px solid var(--border); }
      .fileInfo { grid-column: 1 / -1; }
      .railSpacer { display: none; }
      .qaItem { grid-template-columns: 38px minmax(0, 1fr); }
      .sourcePair { border-right: 0; }
      .previewPair { grid-column: 2; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <main>
    <aside>
      <label class="fileAction openAction">
        開く
        <input id="fileInput" type="file" accept=".js">
      </label>
      <button id="download" class="fileAction saveAction" type="button">保存</button>
      <div class="fileInfo" aria-live="polite">
        <span id="fileName" class="fileName" title="未選択">未選択</span>
        <span id="meta"></span>
        <span id="status" class="status"></span>
      </div>
      <div class="railSpacer"></div>
      <button id="add" type="button">末尾にQA追加</button>
    </aside>
    <section id="qaList" class="qaList" aria-label="QA編集一覧"></section>
  </main>
  <script>
    (() => {
      'use strict';

      const qas = [];
      let fileName = 'qa_math.js';
      let variableName = 'qa_math';
      let leadingComment = '';
      let opened = false;
      let dirty = false;
      let mathReady = false;

      const fileInput = document.getElementById('fileInput');
      const downloadButton = document.getElementById('download');
      const addButton = document.getElementById('add');
      const qaList = document.getElementById('qaList');
      const fileNameElement = document.getElementById('fileName');
      const meta = document.getElementById('meta');
      const status = document.getElementById('status');
      const previewTimers = new WeakMap();

      function normalizeNewlines(value) {
        return String(value ?? '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      }

      function stripOuterMathDelimiters(value) {
        const source = String(value ?? '').trim();
        const pairs = [
          ['$$', '$$'],
          ['\\[', '\\]'],
          ['\\(', '\\)'],
          ['$', '$']
        ];

        for (const [open, close] of pairs) {
          if (
            source.startsWith(open) &&
            source.endsWith(close) &&
            source.length >= open.length + close.length
          ) {
            return source.slice(open.length, -close.length).trim();
          }
        }
        return source;
      }

      function setPreviewMath(preview, value) {
        preview.replaceChildren();
        normalizeNewlines(value).split('\n').forEach(rawLine => {
          const line = document.createElement('div');
          const tex = stripOuterMathDelimiters(rawLine);
          line.textContent = tex ? `\\(${tex}\\)` : '\\(\\vphantom{x}\\)';
          preview.append(line);
        });
      }

      function setStatus(message = '', isError = false) {
        status.textContent = message || (dirty ? '未保存' : '');
        status.classList.toggle('error', isError);
      }

      function updateFileInfo() {
        const displayName = opened ? fileName : '未選択';
        fileNameElement.textContent = displayName;
        fileNameElement.title = displayName;
        meta.textContent = `${qas.length}問${opened ? ` / ${variableName}` : ''}`;
      }

      function markDirty() {
        dirty = true;
        setStatus();
      }

      function makeActionButton(text, title, className, onClick, disabled = false) {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = text;
        button.title = title;
        button.setAttribute('aria-label', title);
        if (className) button.className = className;
        button.disabled = disabled;
        button.addEventListener('click', onClick);
        return button;
      }

      function makeTextarea(value, placeholder, onInput) {
        const textarea = document.createElement('textarea');
        textarea.value = normalizeNewlines(value);
        textarea.placeholder = placeholder;
        textarea.setAttribute('aria-label', placeholder);
        textarea.spellcheck = false;
        textarea.addEventListener('input', event => onInput(event.target.value));
        return textarea;
      }

      function renderList(focusIndex = -1) {
        qaList.replaceChildren();

        if (!qas.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'QAなし';
          qaList.append(empty);
          updateFileInfo();
          return;
        }

        qas.forEach((qa, index) => {
          const item = document.createElement('article');
          item.className = 'qaItem';

          const actions = document.createElement('div');
          actions.className = 'qaActions';
          actions.append(
            makeActionButton('↑', 'このQAを上へ移動', '', () => moveQa(index, -1), index === 0),
            makeActionButton('↓', 'このQAを下へ移動', '', () => moveQa(index, 1), index === qas.length - 1),
            makeActionButton('+', 'このQAの前に追加', '', () => insertQa(index)),
            makeActionButton('×', 'このQAを削除', 'danger', () => removeQa(index))
          );

          const sourcePair = document.createElement('div');
          sourcePair.className = 'qaPair sourcePair';
          const previewPair = document.createElement('div');
          previewPair.className = 'qaPair previewPair';

          const questionPreview = document.createElement('div');
          questionPreview.className = 'previewBox';
          questionPreview.setAttribute('aria-label', '問題のレンダリング');
          const answerPreview = document.createElement('div');
          answerPreview.className = 'previewBox';
          answerPreview.setAttribute('aria-label', '解答のレンダリング');

          const question = makeTextarea(qa.q, '問題', value => {
            qas[index].q = value;
            markDirty();
            queuePreview(item, questionPreview, answerPreview, qas[index]);
          });
          const answer = makeTextarea(qa.a, '解答', value => {
            qas[index].a = value;
            markDirty();
            queuePreview(item, questionPreview, answerPreview, qas[index]);
          });

          sourcePair.append(question, answer);
          previewPair.append(questionPreview, answerPreview);
          item.append(actions, sourcePair, previewPair);
          qaList.append(item);
          queuePreview(item, questionPreview, answerPreview, qa, 0);
        });

        updateFileInfo();
        if (focusIndex >= 0) {
          const target = qaList.querySelectorAll('.qaItem')[focusIndex];
          target?.querySelector('textarea')?.focus();
          target?.scrollIntoView({ block: 'nearest' });
        }
      }

      function queuePreview(item, questionPreview, answerPreview, qa, delay = 140) {
        window.clearTimeout(previewTimers.get(item));
        previewTimers.set(item, window.setTimeout(
          () => renderPreview(questionPreview, answerPreview, qa), delay
        ));
      }

      async function renderPreview(questionPreview, answerPreview, qa) {
        setPreviewMath(questionPreview, qa.q);
        setPreviewMath(answerPreview, qa.a);
        if (!mathReady || !window.MathJax?.typesetPromise) return;
        try {
          MathJax.typesetClear([questionPreview, answerPreview]);
          await MathJax.typesetPromise([questionPreview, answerPreview]);
        } catch (error) {
          console.error(error);
        }
      }

      function moveQa(index, direction) {
        const targetIndex = index + direction;
        if (targetIndex < 0 || targetIndex >= qas.length) return;
        [qas[index], qas[targetIndex]] = [qas[targetIndex], qas[index]];
        markDirty();
        renderList(targetIndex);
      }

      function insertQa(index) {
        qas.splice(index, 0, { q: '', a: '' });
        markDirty();
        renderList(index);
      }

      function addQa() {
        qas.push({ q: '', a: '' });
        markDirty();
        renderList(qas.length - 1);
      }

      function removeQa(index) {
        qas.splice(index, 1);
        markDirty();
        renderList(Math.min(index, qas.length - 1));
      }

      function parseText(text) {
        const source = normalizeNewlines(text);
        const match = source.match(/^\s*((?:(?:\/\/[^\n]*|\/\*[\s\S]*?\*\/)\s*)*)const\s+([^\s=]+)\s*=\s*/);
        if (!match) throw new Error('const qa_名前 = [["問題", "解答"], ...]; 形式ではありません');

        const arrayStart = match[0].length;
        const arrayEnd = findMatchingBracket(source, arrayStart);
        if (arrayEnd < 0) throw new Error('QA配列の終端が見つかりません');

        const value = Function(`"use strict"; return (${source.slice(arrayStart, arrayEnd + 1)});`)();
        if (!Array.isArray(value)) throw new Error('const の右辺が配列ではありません');

        return {
          variableName: match[2],
          leadingComment: match[1] || '',
          items: value.map((row, index) => {
            if (!Array.isArray(row) || row.length < 2) {
              throw new Error(`${index + 1}件目が ["問題", "解答"] 形式ではありません`);
            }
            return { q: String(row[0] ?? ''), a: String(row[1] ?? '') };
          })
        };
      }

      function findMatchingBracket(source, start) {
        while (/\s/.test(source[start] || '')) start++;
        if (source[start] !== '[') return -1;

        let depth = 0;
        let quote = '';
        let escaped = false;
        let lineComment = false;
        let blockComment = false;

        for (let index = start; index < source.length; index++) {
          const char = source[index];
          const next = source[index + 1];

          if (lineComment) {
            if (char === '\n') lineComment = false;
            continue;
          }
          if (blockComment) {
            if (char === '*' && next === '/') {
              blockComment = false;
              index++;
            }
            continue;
          }
          if (quote) {
            if (escaped) escaped = false;
            else if (char === '\\') escaped = true;
            else if (char === quote) quote = '';
            continue;
          }

          if (char === '/' && next === '/') {
            lineComment = true;
            index++;
          } else if (char === '/' && next === '*') {
            blockComment = true;
            index++;
          } else if (char === '"' || char === "'" || char === '`') {
            quote = char;
          } else if (char === '[') {
            depth++;
          } else if (char === ']') {
            depth--;
            if (depth === 0) return index;
          }
        }
        return -1;
      }

      function serialize() {
        const rows = qas
          .map(qa => `  [${JSON.stringify(normalizeNewlines(qa.q))}, ${JSON.stringify(normalizeNewlines(qa.a))}]`)
          .join(',\n');
        return `${leadingComment}const ${variableName} = [\n${rows}\n];\n`;
      }

      async function loadFromFile(file) {
        const parsed = parseText(await file.text());
        qas.splice(0, qas.length, ...parsed.items);
        fileName = file.name || 'qa_math.js';
        variableName = parsed.variableName;
        leadingComment = parsed.leadingComment;
        opened = true;
        dirty = false;
        setStatus('読み込み済み');
        renderList();
      }

      function download() {
        const blob = new Blob([serialize()], { type: 'text/javascript;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName.endsWith('.js') ? fileName : `${fileName}.js`;
        document.body.append(link);
        link.click();
        URL.revokeObjectURL(link.href);
        link.remove();
        dirty = false;
        setStatus('保存済み');
      }

      fileInput.addEventListener('change', event => {
        const file = event.target.files?.[0];
        if (file) {
          loadFromFile(file).catch(error => {
            console.error(error);
            setStatus(error?.message || String(error), true);
          });
        }
        event.target.value = '';
      });
      downloadButton.addEventListener('click', download);
      addButton.addEventListener('click', addQa);

      window.addEventListener('keydown', event => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
          event.preventDefault();
          download();
        }
      });

      window.addEventListener('beforeunload', event => {
        if (!dirty) return;
        event.preventDefault();
        event.returnValue = '';
      });

      window.addEventListener('load', async () => {
        renderList();
        try {
          if (!window.MathJax?.startup?.promise) throw new Error('MathJaxを読み込めませんでした');
          await MathJax.startup.promise;
          mathReady = true;
          renderList();
        } catch (error) {
          console.error(error);
          setStatus(error?.message || String(error), true);
        }
      });
    })();
  </script>
</body>
</html>
